  - The URL is constructed as ws://[window.location.host]/ws
  - If NEXT_PUBLIC_PI_WS_URL is set in env, that value is used instead (existing behavior)
  - After this fix, WebSocket connects automatically on page load without env var
  - npx tsc --noEmit passes
