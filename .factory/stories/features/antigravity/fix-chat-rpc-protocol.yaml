name: Fix chat page to use correct pi RPC protocol
description: >
  The current chat/page.tsx (root index) uses the correct pi RPC protocol
  (type: prompt). However, ChatView.tsx — used on /chat/[id] — still sends
  { type: 'chat' } which pi does not understand. The two implementations must
  be unified. The /chat/page.tsx implementation is the correct one and should
  become the single canonical chat view for ALL chat routes.

  CRITICAL CONTEXT:
  - pi expects: { type: 'prompt', message: string, id?: string }
  - pi emits:   { type: 'message_start', message: { role, model } }
                { type: 'message_update', assistantMessageEvent: { type: 'text_delta', delta: string } }
                { type: 'message_update', assistantMessageEvent: { type: 'tool_use_start', toolName, toolInput } }
                { type: 'message_end' }
                { type: 'agent_end' }
  - The ws-client.ts already has sendRaw(), prompt(), and abort() methods
  - ChatView.tsx incorrectly calls wsClient.send({ type: 'chat', ... }) — must be fixed
  - There must only be ONE implementation of the chat UI; do NOT have two competing systems

  WHAT TO DO:
  1. Read /home/bigmints/Projects/pi-app/src/app/chat/page.tsx — this is the CORRECT implementation
  2. Read /home/bigmints/Projects/pi-app/src/components/chat/ChatView.tsx — this is the OLD/BROKEN one
  3. Update ChatView.tsx so that handleSendMessage calls wsClient.sendRaw({ type: 'prompt', message: content, id: msgId }) instead of wsClient.send({ type: 'chat', ... })
  4. Update ChatView.tsx WebSocket handler to listen for pi RPC frames: message_start, message_update (text_delta), agent_end — instead of the legacy 'token' and 'message_complete' frame types
  5. Update /home/bigmints/Projects/pi-app/src/app/chat/page.tsx to redirect to /chat with conversation list (keep it as an index page that shows ConversationList, not a duplicate chat UI)
  6. Run: cd /home/bigmints/Projects/pi-app && npx tsc --noEmit 2>&1 | head -30 — must pass with 0 errors

