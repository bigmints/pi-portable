acceptance_criteria:
  - Sending a message from any chat view calls wsClient.sendRaw({ type: 'prompt', message, id }) — NOT type:chat
  - Streaming tokens arrive via message_update.assistantMessageEvent.type === text_delta and are appended to the message
  - The assistant message bubble shows the streamed text in real time
  - agent_end marks the stream as complete and re-enables the composer
  - ChatView.tsx and chat/page.tsx do not both implement the full chat — only ChatView.tsx does; chat/page.tsx is an index
  - npx tsc --noEmit passes
