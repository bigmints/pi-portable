name: "UI Overhaul: Queue & Jobs Dashboard"
description: >
  Overhaul the auxiliary user pages—specifically `QueueView`, `JobsView`, `HistoryView`,
  and `SettingsView`—to use pure Tailwind CSS utility classes and standard Shadcn/UI
  layout, cards, badges, and tables. Eliminate all local CSS modules completely.

  WHAT TO CLEAN UP:
  - Delete any local CSS module files associated with queue list, job logs, or setting panel views.
  - Remove all inline custom styled heights or tables in these views.

  WHAT TO IMPLEMENT:
  1. Files: `src/components/queue/*` and `src/components/jobs/*`
     - Rewrite queue lists, execution lists, and active job panels using Shadcn standard Card, Table, and Badge components.
     - Apply pure Tailwind grid/flex styles for progress bars, stats counters, and elapsed time labels.
     - Eliminate any custom styling overrides for loading indicators or state checkmarks.
  2. File: `src/components/settings/SettingsView.tsx`
     - Overhaul form controls, inputs, selects, and switches to use standard Shadcn Switch, Input, Select, and Form primitives.
     - Arrange configuration sections utilizing Tailwind grid layouts and clear text hierarchies.

