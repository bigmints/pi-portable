name: "UI Overhaul: Design Tokens & Globals Setup"
description: >
  Overhaul the core design tokens and globals.css file to use standard Shadcn/UI custom properties
  mapped through standard Tailwind CSS utility classes. Clean up all custom Vanilla CSS rules
  and legacy custom variables, aligning strictly with standard shadcn system values (slate/violet theme)
  and preparing the codebase for pure Tailwind v4 styling.

  WHAT TO CLEAN UP:
  File: src/styles/globals.css
  - Remove all legacy, non-standard chat custom properties (e.g., --color-primary, --color-surface,
    --color-user-bubble, etc.). Standardize strictly on standard Shadcn CSS variables:
    --background, --foreground, --card, --card-foreground, --popover, --popover-foreground,
    --primary, --primary-foreground, --secondary, --secondary-foreground, --muted, --muted-foreground,
    --accent, --accent-foreground, --destructive, --destructive-foreground, --border, --input, --ring, --radius.
  - Retain iOS specific safe area environment variable mappings for viewport consistency, but ensure
    they are applied cleanly without raw stylesheet layout overrides.
  - Delete any legacy CSS styles that are redundant with Tailwind classes (e.g. body styling, main padding).

  WHAT TO IMPLEMENT:
  - Define standard slate-based palette with violet accent as the primary color.
  - In globals.css `@layer base`:
    - Configure `:root` with standard light mode variables (e.g., --background: 0 0% 100%, --foreground: 222.2 84% 4.9%, --primary: 262 83% 58%, etc.).
    - Configure `[data-theme="dark"]` with standard dark mode variables (e.g., --background: 222.2 84% 4.9%, --foreground: 210 40% 98%, etc.).
  - Apply clean default Tailwind resetting rules:
    ```css
    @layer base {
      * {
        @apply border-border;
      }
      body {
        @apply bg-background text-foreground antialiased;
      }
    }
    ```

