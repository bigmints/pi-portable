  - Sidebar transitions smoothly when collapsed or expanded using pure Tailwind classes
  - Standard Shadcn Button, DropdownMenu, and Radix primitives are utilized correctly
  - Light and Dark modes switch instantly and conform to the standard Shadcn tokens
  - npx tsc --noEmit and linting pass successfully
