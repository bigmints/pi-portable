name: "UI Overhaul: Sheets, Dialogs & Modals"
description: >
  Migrate and refactor advanced interactive features—such as `ContextMenu`, `ForkConfirmationSheet`,
  `AttachmentStrip`, `VoiceInput`, and `CommandPalette`—to use standard Radix UI or Shadcn/UI
  dialogs, sheets, context menus, and popover components. Replace legacy CSS modules completely.

  WHAT TO CLEAN UP:
  - Delete `src/components/chat/ContextMenu.module.css`
  - Delete `src/components/chat/ForkConfirmationSheet.module.css`
  - Delete `src/components/chat/AttachmentStrip.module.css`
  - Delete `src/components/chat/VoiceInput.module.css`

  WHAT TO IMPLEMENT:
  1. File: `src/components/chat/ContextMenu.tsx`
     - Integrate standard Shadcn ContextMenu component (derived from Radix ContextMenu).
     - Style items and selection highlights using pure Tailwind utilities, eliminating local stylesheet overrides.
  2. File: `src/components/chat/ForkConfirmationSheet.tsx`
     - Overhaul confirmation panels to use the standard Shadcn `Dialog` or `Sheet` primitive.
     - Apply standard overlay configurations and clean buttons.
  3. File: `src/components/chat/AttachmentStrip.tsx`
     - Rewrite the file attachment display strip to use simple, elegant Tailwind-based thumbnails, clean close buttons, and border configurations.
  4. File: `src/components/chat/VoiceInput.tsx`
     - Overhaul voice transcription control UI utilizing clean Tailwind-styled indicator states (recording animation, cancel controls).
  5. File: `src/components/chat/CommandPalette.tsx`
     - Overhaul using the standard Shadcn `Command` dialog.

