  10. `src/components/chat/ChatView.tsx` — Import `useSwipeGesture` and `SwipeBackOverlay`. Add swipe gesture to the
  chat viewport ref. On swipe right: `router.push('/chat')`. Render SwipeBackOverlay during swipe progress. Apply CSS
  transform to chat content during drag.


  11. `src/components/chat/ChatView.module.css` — Add `.chat-viewport { overscroll-behavior: contain; }` rule.


  12. `src/components/chat/ConversationList.tsx` — Import `usePullToRefresh`, `PullToRefreshIndicator`, `SwipeToDelete`.
  Wrap list with pull-to-refresh. Render indicator at top. On refresh: call conversations store refetch. Wrap each list
  item with SwipeToDelete. On delete: call store deleteConversation.


  13. `src/components/chat/ConversationList.module.css` — Add `.list-container { overscroll-behavior: contain; }` and
