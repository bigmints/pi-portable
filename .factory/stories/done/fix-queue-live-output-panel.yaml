  import { OutputLine } from '@/store/queue-output';

  import { Wrench, MessageSquare } from 'lucide-react';

  import styles from './OutputLineRenderer.module.css';

  export default function OutputLineRenderer({ line, isLastStreaming }: { line: OutputLine; isLastStreaming?: boolean })
  {
    if (line.type === 'user') return <div className={styles.user}><MessageSquare size={14} className={styles.icon} />{line.content}</div>;
    if (line.type === 'tool-call' || line.type === 'tool-result') return <div className={`${styles.tool} ${styles[line.type === 'tool-call' ? 'tc' : 'tr']}`}><Wrench size={12} /> {line.toolName || 'tool'}: {line.content}</div>;
    return <div className={styles.assistant}>{line.content}{isLastStreaming && <span className={styles.cursor}>▌</span>}</div>;
  }

