  ## Step 1: Create the store

  Write `src/store/queue-output.ts`:

  ```

  cat > src/store/queue-output.ts << 'STORE'

  'use client';

  import { create } from 'zustand';

  export type OutputLineType = 'user' | 'assistant' | 'tool-call' | 'tool-result';

  export interface OutputLine { type: OutputLineType; content: string; timestamp: number; toolName?: string; }

  export interface QueueTask { id: string; position: number; instruction: string; status: 'pending' | 'running' |
  'completed' | 'error'; conversationId?: string; }

  interface State { activeTask: QueueTask | null; outputLines: OutputLine[]; status: 'idle' | 'running' | 'completed' |
  'error'; startedAt: number | null; conversationId: string | null; }

  interface Actions { setActiveTask: (t: QueueTask | null) => void; appendOutput: (l: OutputLine) => void; clearOutput:
  () => void; markComplete: (cid?: string) => void; markError: () => void; resetToIdle: () => void; setStartedAt: (t:
  number | null) => void; }

  export const useQueueOutputStore = create<State & Actions>((set) => ({
    activeTask: null, outputLines: [], status: 'idle', startedAt: null, conversationId: null,
    setActiveTask: (t) => set({ activeTask: t, status: t ? 'running' : 'idle', startedAt: t ? Date.now() : null }),
    appendOutput: (l) => set((s) => ({ outputLines: [...s.outputLines, l] })),
    clearOutput: () => set({ outputLines: [] }),
    markComplete: (cid) => set({ status: 'completed', conversationId: cid || null }),
    markError: () => set({ status: 'error' }),
    resetToIdle: () => set({ activeTask: null, outputLines: [], status: 'idle', startedAt: null, conversationId: null }),
    setStartedAt: (t) => set({ startedAt: t }),
  }));

  STORE

  ```


  ## Step 2: Create DurationCounter component

  Write `src/components/queue/DurationCounter.tsx`:

  ```

  cat > src/components/queue/DurationCounter.tsx << 'COMP'

  'use client';

  import { useEffect, useState } from 'react';

  import styles from './DurationCounter.module.css';

  export default function DurationCounter({ startedAt }: { startedAt: number }) {
    const [s, setS] = useState(0);
    useEffect(() => { const t = () => setS(Math.floor((Date.now() - startedAt) / 1000)); t(); const id = setInterval(t, 1000); return () => clearInterval(id); }, [startedAt]);
    return <span className={styles.d}>{String(Math.floor(s / 60)).padStart(2, '0')}:{String(s % 60).padStart(2, '0')}</span>;
  }

  COMP

  ```


