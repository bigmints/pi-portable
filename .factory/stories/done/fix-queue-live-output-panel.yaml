  ## Step 4: Create LiveOutputPanel

  Write `src/components/queue/LiveOutputPanel.tsx`:

  ```

  cat > src/components/queue/LiveOutputPanel.tsx << 'COMP'

  'use client';

  import { useEffect, useRef } from 'react';

  import { useRouter } from 'next/navigation';

  import { useQueueOutputStore } from '@/store/queue-output';

  import DurationCounter from './DurationCounter';

  import OutputLineRenderer from './OutputLineRenderer';

  import { Play, ExternalLink, AlertTriangle, Loader2 } from 'lucide-react';

  import styles from './LiveOutputPanel.module.css';

  export default function LiveOutputPanel() {
    const router = useRouter();
    const { activeTask, outputLines, status, startedAt, conversationId, resetToIdle } = useQueueOutputStore();
    const scrollRef = useRef<HTMLDivElement>(null);
    useEffect(() => { scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' }); }, [outputLines]);
    const truncated = activeTask?.instruction.length! > 60 ? activeTask.instruction.slice(0, 60) + '…' : activeTask?.instruction;
    if (status === 'idle') return <div className={styles.panel}><div className={styles.idle}><Play size={32} className={styles.idleIcon} /><p>Queue is ready — press Run to start</p></div></div>;
    return <div className={styles.panel}><div className={styles.header}><div className={styles.hl}><span className={styles.badge}>Task {activeTask?.position}</span><span className={styles.inst}>{truncated || 'Running…'}</span></div><div className={styles.hr}>{status === 'running' && startedAt && <DurationCounter startedAt={startedAt} />}{status === 'running' && <Loader2 size={14} className={styles.spin} />}{status === 'completed' && conversationId && <button className={styles.vc} onClick={() => router.push(`/chat/${conversationId}`)}><ExternalLink size={12} /> View in Chat</button>}{status === 'error' && <AlertTriangle size={14} className={styles.err} />}</div></div><div className={styles.body} ref={scrollRef}>{outputLines.map((l, i) => <OutputLineRenderer key={i} line={l} isLastStreaming={i === outputLines.length - 1 && status === 'running'} />){outputLines.length === 0 && status === 'running' && <div className={styles.ph}>Waiting for output…</div>}</div>{status !== 'running' && <div className={styles.footer}><button className={styles.rb} onClick={resetToIdle}>Clear</button></div>}</div>;
  }

  COMP

  ```


