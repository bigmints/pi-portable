  }


  .shimmer {
    width: 60px;
    height: 16px;
    background: linear-gradient(90deg, transparent 0%, var(--color-primary) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    margin-left: auto;
  }


  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }


  .errorIcon {
    color: var(--color-error);
    margin-left: auto;
  }


  .chevron, .chevronOpen {
    color: var(--color-foreground-muted);
    margin-left: 4px;
  }


  .stepDetails {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--color-border);
  }


  .markdownOutput {
    padding: 12px;
    background: var(--color-surface);
    border-radius: 8px;
    border: 1px solid var(--color-border);
    font-size: 14px;
    line-height: 1.5;
  }

  EOF


  # Write JsonPanel.tsx

  cat > src/components/jobs/JsonPanel.tsx << 'EOF'

  "use client";


  import { Prism as SyntaxHighlighter } from "react-syntax-highlighter";

  import { oneDark } from "react-syntax-highlighter/dist/esm/styles/prism";

  import styles from "./JsonPanel.module.css";


  export default function JsonPanel({ title, data }: { title: string; data: any }) {
    const jsonString = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    return (
      <div className={styles.panel}>
        <div className={styles.panelTitle}>{title}</div>
        <SyntaxHighlighter language="json" style={oneDark} customStyle={styles.code}>
          {jsonString}
        </SyntaxHighlighter>
      </div>
    );
  }

  EOF


  # Write JsonPanel.module.css

  cat > src/components/jobs/JsonPanel.module.css << 'EOF'

  .panel {
    margin-top: 8px;
  }


  .panelTitle {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--color-foreground-muted);
    margin-bottom: 4px;
  }


  .code {
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.4;
  }

  EOF


  echo "All 6 component files written."


  # Update types - add JobStep if not present

  if ! grep -q "interface JobStep" src/types/chat.ts; then
    cat >> src/types/chat.ts << 'EOF'

  export interface JobStep {
    id: string;
    name: string;
    stepType: "plan" | "tool_call" | "result";
    input: Record<string, any>;
    output: string;
    status: "pending" | "running" | "completed" | "error";
    duration_ms: number | null;
    started_at: string;
    completed_at: string | null;
  }

  EOF
    echo "JobStep interface added to types/chat.ts"
  else
    echo "JobStep interface already exists in types/chat.ts"
  fi


  # Update store - add step methods if not present

  if ! grep -q "addStep" src/store/jobs.ts; then
    cat >> src/store/jobs.ts << 'EOF'

  // Step management actions

  addStep: (jobId: string, step: JobStep) => {
    const job = state.jobs.find(j => j.id === jobId);
    if (job) {
      job.steps = [...job.steps, step];
    }
  },

  updateStep: (jobId: string, stepId: string, updates: Partial<JobStep>) => {
    const job = state.jobs.find(j => j.id === jobId);
    if (job) {
      job.steps = job.steps.map(s => s.id === stepId ? { ...s, ...updates } : s);
    }
  },

  setStepRunning: (jobId: string, stepId: string) => {
    const job = state.jobs.find(j => j.id === jobId);
    if (job) {
      job.steps = job.steps.map(s => s.id === stepId ? { ...s, status: "running" as const, started_at: new Date().toISOString() } : s);
    }
  },

  setStepCompleted: (jobId: string, stepId: string, output: string, duration_ms: number) => {
    const job = state.jobs.find(j => j.id === jobId);
    if (job) {
      job.steps = job.steps.map(s => s.id === stepId ? { ...s, status: "completed" as const, output, duration_ms, completed_at: new Date().toISOString() } : s);
    }
  },

  EOF
    echo "Step methods added to store/jobs.ts"
  else
    echo "Step methods already exist in store/jobs.ts"
  fi


  # Update job detail page - add StepTimeline import and render

  if ! grep -q "StepTimeline" src/app/jobs/\[id\]/page.tsx; then
    sed -i '1i import StepTimeline from "@/components/jobs/StepTimeline";' src/app/jobs/\[id\]/page.tsx
    sed -i 's|</main>|<StepTimeline jobId={id} />\n      </main>|' src/app/jobs/\[id\]/page.tsx
    echo "StepTimeline added to job detail page"
  else
    echo "StepTimeline already in job detail page"
  fi


  echo "All files written and updated."

  echo "Running build..."

  npm run build

  SCRIPT

  ```


