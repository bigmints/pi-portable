fix_instructions: >-
  ## CRITICAL: DO NOT LIST FILES. DO NOT SCAN. EXECUTE THIS SCRIPT.


  The CLI has been stuck listing directory contents. Break the loop by running a single bash script that creates all
  files.


  Execute this exact command in /home/bigmints/Projects/pi-app:


  ```bash

  bash << 'SCRIPT'

  #!/bin/bash

  set -e

  cd /home/bigmints/Projects/pi-app


  # Create directory

  mkdir -p src/components/jobs


  # Write StepTimeline.tsx

  cat > src/components/jobs/StepTimeline.tsx << 'EOF'

  "use client";


  import { useEffect, useRef } from "react";

  import { useJobsStore } from "@/store/jobs";

  import StepItem from "./StepItem";

  import styles from "./StepTimeline.module.css";


  export default function StepTimeline({ jobId }: { jobId: string }) {
    const { getJob } = useJobsStore();
    const job = getJob(jobId);
    const steps = job?.steps || [];
    const scrollRef = useRef<HTMLDivElement>(null);

    useEffect(() => {
      if (scrollRef.current) {
        scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }
    }, [steps.length]);

    return (
      <div className={styles.timelineContainer} ref={scrollRef}>
        <div className={styles.timelineLine}>
          {steps.map((step, i) => (
            <StepItem key={step.id || i} step={step} />
          ))}
        </div>
      </div>
    );
  }

  EOF


  # Write StepTimeline.module.css

  cat > src/components/jobs/StepTimeline.module.css << 'EOF'

  .timelineContainer {
    max-height: 400px;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--color-border) transparent;
  }


  .timelineContainer::-webkit-scrollbar {
    width: 6px;
  }


  .timelineContainer::-webkit-scrollbar-thumb {
    background: var(--color-border);
    border-radius: 3px;
  }


  .timelineLine {
    position: relative;
    padding-left: 24px;
  }


  .timelineLine::before {
    content: "";
    position: absolute;
    left: 7px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--color-border);
  }

  EOF


  # Write StepItem.tsx

  cat > src/components/jobs/StepItem.tsx << 'EOF'

  "use client";


  import { useState } from "react";

  import { Lightbulb, Wrench, CheckCircle, AlertCircle, ChevronDown, ChevronRight } from "lucide-react";

  import { JobStep } from "@/types/chat";

  import JsonPanel from "./JsonPanel";

  import ReactMarkdown from "react-markdown";

  import styles from "./StepItem.module.css";


  const ICONS: Record<string, React.ComponentType<{ size?: number }>> = {
    plan: Lightbulb,
    tool_call: Wrench,
    result: CheckCircle,
  };


  export default function StepItem({ step }: { step: JobStep }) {
    const [expanded, setExpanded] = useState(false);
    const Icon = ICONS[step.stepType] || Wrench;
    const isRunning = step.status === "running";
    const isCompleted = step.status === "completed";
    const isError = step.status === "error";

    const durationText = step.duration_ms ? `${step.duration_ms}ms` : "";

    return (
      <div className={styles.stepRow} onClick={() => setExpanded(!expanded)}>
        <div className={styles.stepIcon}>
          <Icon size={16} />
        </div>
        <div className={styles.stepContent}>
          <div className={styles.stepHeader}>
            <span className={styles.stepName}>{step.name}</span>
            {isRunning && <div className={styles.shimmer} />}
            {isCompleted && <span className={styles.duration}>{durationText}</span>}
            {isError && <AlertCircle size={14} className={styles.errorIcon} />}
            <span className={expanded ? styles.chevronOpen : styles.chevron}>
              {expanded ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
            </span>
          </div>
          {expanded && (step.input || step.output) && (
            <div className={styles.stepDetails}>
              {step.input && <JsonPanel title="Input" data={step.input} />}
              {step.output && step.stepType === "result" ? (
                <div className={styles.markdownOutput}>
                  <ReactMarkdown>{step.output}</ReactMarkdown>
                </div>
              ) : step.output ? (
                <JsonPanel title="Output" data={step.output} />
              ) : null}
            </div>
          )}
        </div>
      </div>
    );
  }

  EOF


  # Write StepItem.module.css

  cat > src/components/jobs/StepItem.module.css << 'EOF'

