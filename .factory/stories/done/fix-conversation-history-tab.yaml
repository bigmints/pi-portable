  'use client';

  import { useParams, useRouter } from 'next/navigation';

  import Link from 'next/link';

  import { ArrowLeft, Play } from 'lucide-react';

  import { useConversationsStore } from '@/store/conversations';

  import { MessageBubble } from '@/components/chat/MessageBubble';

  import styles from './page.module.css';


  export default function HistoryDetailPage() {
    const params = useParams();
    const router = useRouter();
    const id = params.id as string;
    const conversations = useConversationsStore((s) => s.conversations);
    const conversation = conversations.find((c) => c.id === id);

    return (
      <div className={styles.page}>
        <div className={styles.header}>
          <button className={styles.backBtn} onClick={() => router.back()}>
            <ArrowLeft size={20} />
          </button>
          <h1 className={styles.title}>{conversation?.title || 'Conversation'}</h1>
        </div>
        {!conversation ? (
          <div className={styles.notFound}>Conversation not found.</div>
        ) : (
          <>
            <div className={styles.messages}>
              {/* Render messages - in production these come from messages store */}
              <div className={styles.placeholder}>
                Messages will appear here when loaded from the messages store.
              </div>
            </div>
            <div className={styles.footer}>
              <Link href={`/chat/${id}`} className={styles.resumeBtn}>
                <Play size={16} />
                Resume Conversation
              </Link>
            </div>
          </>
        )}
      </div>
    );
  }

