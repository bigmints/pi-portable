  ### 12. `src/components/history/HistoryList.tsx`

  ```tsx

  'use client';

  import { useEffect, useRef } from 'react';

  import { useHistoryStore, type HistoryGroup } from '@/store/history';

  import { PinnedSection } from './PinnedSection';

  import { DayGroup } from './DayGroup';

  import { HistorySkeleton } from './HistorySkeleton';

  import { HistoryEmptyState } from './HistoryEmptyState';

  import styles from './HistoryList.module.css';


  export function HistoryList() {
    const { conversations, isLoading, isLoadingMore, hasMore, loadMore, getPinnedConversations, getGroupedConversations } = useHistoryStore();
    const sentinelRef = useRef<HTMLDivElement>(null);

    useEffect(() => {
      const observer = new IntersectionObserver(
        (entries) => {
          if (entries[0].isIntersecting && hasMore && !isLoadingMore) {
            loadMore();
          }
        },
        { rootMargin: '200px' }
      );
      if (sentinelRef.current) observer.observe(sentinelRef.current);
      return () => observer.disconnect();
    }, [hasMore, isLoadingMore, loadMore]);

    if (isLoading) return <HistorySkeleton />;
    if (conversations.length === 0) return <HistoryEmptyState />;

    const pinned = getPinnedConversations();
    const groups: HistoryGroup[] = getGroupedConversations();

    return (
      <div className={styles.container}>
        {pinned.length > 0 && <PinnedSection conversations={pinned} />}
        {groups.map((g) => (
          <DayGroup key={g.key} group={g} />
        ))}
        {hasMore && (
          <div ref={sentinelRef} className={styles.sentinel}>
            {isLoadingMore && <HistorySkeleton />}
          </div>
        )}
      </div>
    );
  }

  ```


