  ```typescript

  import { create } from 'zustand';

  import { persist } from 'zustand/middleware';

  import type { Conversation } from '@/types/chat';


  export interface HistoryGroup {
    label: string;
    key: 'today' | 'yesterday' | 'this-week' | 'older';
    conversations: Conversation[];
  }


  interface HistoryState {
    conversations: Conversation[];
    pinnedIds: string[];
    page: number;
    hasMore: boolean;
    isLoading: boolean;
    isLoadingMore: boolean;
    setConversations: (conversations: Conversation[]) => void;
    loadMore: () => void;
    pinConversation: (id: string) => void;
    unpinConversation: (id: string) => void;
    getPinnedConversations: () => Conversation[];
    getGroupedConversations: () => HistoryGroup[];
  }


  export const useHistoryStore = create<HistoryState>()(
    persist(
      (set, get) => ({
        conversations: [],
        pinnedIds: [],
        page: 0,
        hasMore: true,
        isLoading: false,
        isLoadingMore: false,
        setConversations: (conversations) => set({ conversations }),
        loadMore: () => set((s) => ({ page: s.page + 1 })),
        pinConversation: (id) =>
          set((s) => ({ pinnedIds: s.pinnedIds.includes(id) ? s.pinnedIds : [...s.pinnedIds, id] })),
        unpinConversation: (id) =>
          set((s) => ({ pinnedIds: s.pinnedIds.filter((p) => p !== id) })),
        getPinnedConversations: () => {
          const { conversations, pinnedIds } = get();
          return conversations.filter((c) => pinnedIds.includes(c.id));
        },
        getGroupedConversations: () => {
          const { conversations, pinnedIds } = get();
          const unpinned = conversations.filter((c) => !pinnedIds.includes(c.id));
          const groups: Record<string, HistoryGroup> = {
            today: { label: 'Today', key: 'today', conversations: [] },
            yesterday: { label: 'Yesterday', key: 'yesterday', conversations: [] },
            'this-week': { label: 'This Week', key: 'this-week', conversations: [] },
            older: { label: 'Older', key: 'older', conversations: [] },
          };
          for (const c of unpinned) {
            const d = new Date(c.last_message_at || c.updated_at || Date.now());
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const weekAgo = new Date(today);
            weekAgo.setDate(weekAgo.getDate() - 7);
            let key: HistoryGroup['key'];
            if (d >= today) key = 'today';
            else if (d >= yesterday) key = 'yesterday';
            else if (d >= weekAgo) key = 'this-week';
            else key = 'older';
            groups[key].conversations.push(c);
          }
          return Object.values(groups).filter((g) => g.conversations.length > 0);
        },
      }),
      { name: 'pi-history' }
    )
  );

  ```


  ### 2. `src/components/history/ConversationEntry.tsx`

  ```tsx

  'use client';

  import Link from 'next/link';

  import { Pin, MessageSquare } from 'lucide-react';

  import type { Conversation } from '@/types/chat';

  import { useHistoryStore } from '@/store/history';

  import styles from './ConversationEntry.module.css';


  interface Props {
    conversation: Conversation;
  }


  export function ConversationEntry({ conversation }: Props) {
    const { pinConversation, unpinConversation, pinnedIds } = useHistoryStore();
    const isPinned = pinnedIds.includes(conversation.id);
    const date = conversation.last_message_at || conversation.updated_at;
    const relativeDate = date ? new Date(date).toLocaleDateString() : '';

    return (
      <Link href={`/history/${conversation.id}`} className={styles.entry}>
        <div className={styles.info}>
          <div className={styles.header}>
            <span className={styles.badge} style={{ backgroundColor: conversation.project_color || 'var(--color-accent)' }} />
            <span className={styles.title}>{conversation.title || 'Untitled'}</span>
          </div>
          <div className={styles.meta}>
            <span>{conversation.model || 'Unknown model'}</span>
            <span className={styles.dot}>•</span>
            <span className={styles.count}>
              <MessageSquare size={12} /> {conversation.message_count || 0}
            </span>
            <span className={styles.dot}>•</span>
            <span className={styles.date}>{relativeDate}</span>
          </div>
        </div>
        <button
          className={styles.pinBtn}
          onClick={(e) => {
            e.preventDefault();
            e.stopPropagation();
            isPinned ? unpinConversation(conversation.id) : pinConversation(conversation.id);
          }}
          aria-label={isPinned ? 'Unpin' : 'Pin'}
        >
          <Pin size={16} fill={isPinned ? 'currentColor' : 'none'} />
        </button>
      </Link>
    );
  }

  ```


