  ### FILE 1: `src/store/connection.ts` — REPLACE ENTIRE FILE

  ```typescript

  import { create } from 'zustand';


  export type ConnectionStatus = 'connected' | 'reconnecting' | 'offline';


  interface ConnectionState {
    status: ConnectionStatus;
    reconnectAttempts: number;
    maxReconnectAttempts: number;
    lastAttemptAt: Date | null;
    setConnected: () => void;
    setReconnecting: () => void;
    setOffline: () => void;
    retryConnection: () => void;
    incrementReconnectAttempt: () => boolean;
  }


  export const useConnectionStore = create<ConnectionState>((set) => ({
    status: 'connected',
    reconnectAttempts: 0,
    maxReconnectAttempts: 10,
    lastAttemptAt: null,
    setConnected: () => set({ status: 'connected', reconnectAttempts: 0, lastAttemptAt: null }),
    setReconnecting: () => set((state) => ({ status: 'reconnecting', reconnectAttempts: state.reconnectAttempts + 1, lastAttemptAt: new Date() })),
    setOffline: () => set({ status: 'offline' }),
    retryConnection: () => set({ status: 'reconnecting', reconnectAttempts: 1, lastAttemptAt: new Date() }),
    incrementReconnectAttempt: () => {
      const state = useConnectionStore.getState();
      if (state.reconnectAttempts >= state.maxReconnectAttempts) {
        set({ status: 'offline' });
        return false;
      }
      set((s) => ({ reconnectAttempts: s.reconnectAttempts + 1, lastAttemptAt: new Date() }));
      return true;
    },
  }));

  ```


