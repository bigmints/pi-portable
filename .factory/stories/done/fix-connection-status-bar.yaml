  ### FILE 4: Update `src/lib/ws-client.ts` — APPEND AUTO-RECONNECT LOGIC

  Add these variables and methods to the existing ws-client:

  ```typescript

  // Add near top with other imports/state

  let reconnectTimer: ReturnType<typeof setTimeout> | null = null;

  let reconnectAttempts = 0;

  const MAX_RECONNECT_ATTEMPTS = 10;

  const BACKOFF_DELAYS = [1000, 2000, 4000, 8000, 16000, 30000];


  function getBackoffDelay(attempt: number): number {
    const idx = Math.min(attempt - 1, BACKOFF_DELAYS.length - 1);
    return BACKOFF_DELAYS[idx];
  }


  function scheduleReconnect() {
    if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
      useConnectionStore.getState().setOffline();
      return;
    }
    reconnectAttempts++;
    useConnectionStore.getState().setReconnecting();
    const delay = getBackoffDelay(reconnectAttempts);
    reconnectTimer = setTimeout(() => {
      // Attempt reconnect
      connect();
    }, delay);
  }


  // In the connect() function, on error/close, call scheduleReconnect()

  // On successful open, call:

  //   reconnectAttempts = 0;

  //   useConnectionStore.getState().setConnected();

  //   showToast('Connected');


  export function retryConnection() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectAttempts = 0;
    useConnectionStore.getState().retryConnection();
    connect();
  }


  export function disconnect() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = null;
    reconnectAttempts = 0;
    if (ws) ws.close();
  }

  ```


