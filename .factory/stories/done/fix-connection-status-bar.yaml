  'use client';


  import { useConnectionStore, ConnectionStatus } from '@/store/connection';

  import styles from './ConnectionStatus.module.css';


  export function ConnectionStatus() {
    const { status, reconnectAttempts, maxReconnectAttempts, retryConnection } = useConnectionStore();

    if (status === 'connected') {
      return null;
    }

    return (
      <div className={styles.container}>
        {status === 'reconnecting' && (
          <>
            <span className={styles.spinner} />
            <span className={styles.text}>
              Reconnecting ({reconnectAttempts} of {maxReconnectAttempts})
            </span>
          </>
        )}
        {status === 'offline' && (
          <>
            <span className={styles.dot} />
            <span className={styles.text}>Offline</span>
            <button className={styles.button} onClick={retryConnection}>
              Try again
            </button>
          </>
        )}
      </div>
    );
  }

  ```


