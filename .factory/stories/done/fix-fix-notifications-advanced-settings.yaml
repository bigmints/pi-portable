  "use client";

  import { useEffect, useState } from "react";

  import { Bug } from "lucide-react";

  import DebugPanel from "./DebugPanel";

  import styles from "./DebugModeToggle.module.css";

  export default function DebugModeToggle() {
    const [enabled, setEnabled] = useState(() => { try { return JSON.parse(localStorage.getItem("pi-debug-mode") || "false"); } catch { return false; } });
    const [showPanel, setShowPanel] = useState(false);
    useEffect(() => { localStorage.setItem("pi-debug-mode", JSON.stringify(enabled)); }, [enabled]);
    const toggle = () => { setEnabled((p) => !p); if (!enabled) setShowPanel(true); };
    return (
      <>
        <div className={styles.row}><div className={styles.left}><Bug size={18} /><span>Debug Mode</span></div><button className={`${styles.switch} ${enabled ? styles.on : ""}`} onClick={toggle} aria-pressed={enabled}><span className={styles.knob} /></button></div>
        {enabled && showPanel && <DebugPanel />}
      </>
    );
  }

