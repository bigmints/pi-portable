  "use client";

  import { create } from "zustand";

  import { persist } from "zustand/middleware";

  export interface NotificationSettings {
    jobComplete: boolean;
    jobError: boolean;
    taskComplete: boolean;
    taskFailed: boolean;
    queueComplete: boolean;
    soundEffects: boolean;
  }

  const DEFAULT_SETTINGS: NotificationSettings = {
    jobComplete: true, jobError: true, taskComplete: true,
    taskFailed: true, queueComplete: true, soundEffects: true,
  };

  interface Store {
    settings: NotificationSettings;
    toggleSetting: (key: keyof NotificationSettings) => void;
    resetSettings: () => void;
  }

  export const useNotificationSettingsStore = create<Store>()(
    persist((set) => ({
      settings: DEFAULT_SETTINGS,
      toggleSetting: (key) => set((state) => {
        const updated = { ...state.settings, [key]: !state.settings[key] };
        fetch("/api/settings/notifications", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updated) }).catch(() => {});
        return { settings: updated };
      }),
      resetSettings: () => set({ settings: DEFAULT_SETTINGS }),
    }), { name: "pi-notification-settings" })
  );

  EOF


