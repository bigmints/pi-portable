  import styles from "./ClearCacheButton.module.css";

  export default function ClearCacheButton() {
    const [confirm, setConfirm] = useState(false);
    const addToast = useToastStore((s) => s.addToast);
    const handleClear = () => {
      const keysToRemove: string[] = [];
