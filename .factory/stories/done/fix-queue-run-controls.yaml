  FILE 4: src/components/queue/QueueSettingsPopover.tsx

  ```tsx

  'use client';

  import { useState, useRef, useEffect } from 'react';

  import { Cog } from 'lucide-react';

  import { useQueueControlStore } from '@/store/queue-control';

  import styles from './QueueSettingsPopover.module.css';


  export function QueueSettingsPopover({ disabled }: { disabled: boolean }) {
    const [open, setOpen] = useState(false);
    const ref = useRef<HTMLDivElement>(null);
    const { settings, setOnFailure, toggleAutoClear } = useQueueControlStore();

    useEffect(() => {
      const handler = (e: MouseEvent) => {
        if (ref.current && !ref.current.contains(e.target as Node)) {
          setOpen(false);
        }
      };
      document.addEventListener('mousedown', handler);
      return () => document.removeEventListener('mousedown', handler);
    }, []);

    return (
      <div ref={ref} className={styles.popover}>
        <button className={styles.gearBtn} disabled={disabled} onClick={() => setOpen(!open)}>
          <Cog size={16} />
        </button>
        {open && (
          <div className={styles.dropdown}>
            <label className={styles.field}>
              On failure
              <select value={settings.onFailure} onChange={(e) => setOnFailure(e.target.value as any)} onClick={(e) => e.stopPropagation()}>
                <option value="pause">Pause queue</option>
                <option value="skip">Skip and continue</option>
                <option value="abort">Abort all</option>
              </select>
            </label>
            <label className={styles.field}>
              Auto-clear completed
              <input type="checkbox" checked={settings.autoClearCompleted} onChange={toggleAutoClear} onClick={(e) => e.stopPropagation()} />
            </label>
          </div>
        )}
      </div>
    );
  }

  ```


