  'use client';

  import { Play, Square, Cog } from 'lucide-react';

  import { useQueueControlStore } from '@/store/queue-control';

  import { QueueSettingsPopover } from './QueueSettingsPopover';

  import { CancelConfirmDialog } from './CancelConfirmDialog';

  import styles from './QueueControls.module.css';


  export function QueueControls({ isEmpty, taskCount, completed, failed }: { isEmpty: boolean; taskCount: number;
  completed: number; failed: number }) {
    const { status, pauseAfterCurrent, confirmCancel, runQueue, togglePauseAfterCurrent, cancelAll, dismissCancelConfirm } = useQueueControlStore();
    const isRunning = status === 'running';
    const isDisabled = isEmpty || isRunning;

    return (
      <div className={styles.controls}>
        <button className={styles.btn} disabled={isEmpty} onClick={runQueue}>
          <Play size={16} />
          {isEmpty ? 'Empty' : 'Run Queue'}
        </button>
        <button className={`${styles.btn} ${styles.toggle}`} disabled={isDisabled} onClick={togglePauseAfterCurrent}>
          {pauseAfterCurrent ? 'Resuming' : 'Pause after current'}
        </button>
        <button className={`${styles.btn} ${styles.danger}`} disabled={isEmpty} onClick={() => cancelAll()}>
          <Square size={16} />
          Cancel all
        </button>
        <div className={styles.gear}>
          <QueueSettingsPopover disabled={isEmpty} />
        </div>
        {confirmCancel && <CancelConfirmDialog onConfirm={cancelAll} onDismiss={dismissCancelConfirm} />}
        <div className={styles.summary}>
          {completed} of {taskCount} tasks complete — {failed} failed
        </div>
      </div>
    );
  }

  ```


