  import { create } from 'zustand';


  export type QueueStatus = 'idle' | 'running' | 'paused' | 'completed' | 'cancelled';

  export type OnFailureMode = 'pause' | 'skip' | 'abort';


  export interface QueueSettings {
    onFailure: OnFailureMode;
    autoClearCompleted: boolean;
  }


  const DEFAULT_SETTINGS: QueueSettings = {
    onFailure: 'pause',
    autoClearCompleted: false,
  };


  interface QueueControlState {
    status: QueueStatus;
    pauseAfterCurrent: boolean;
    settings: QueueSettings;
    confirmCancel: boolean;
    runQueue: () => void;
    togglePauseAfterCurrent: () => void;
    cancelAll: () => void;
    dismissCancelConfirm: () => void;
    setOnFailure: (mode: OnFailureMode) => void;
    toggleAutoClear: () => void;
    setStatus: (status: QueueStatus) => void;
  }


  export const useQueueControlStore = create<QueueControlState>((set) => ({
    status: 'idle',
    pauseAfterCurrent: false,
    settings: DEFAULT_SETTINGS,
    confirmCancel: false,
    runQueue: () => set(() => ({ status: 'running' })),
    togglePauseAfterCurrent: () => set((s) => ({ pauseAfterCurrent: !s.pauseAfterCurrent })),
    cancelAll: () => set(() => ({ status: 'idle', confirmCancel: false })),
    dismissCancelConfirm: () => set(() => ({ confirmCancel: false })),
    setOnFailure: (mode) => set((s) => ({ settings: { ...s.settings, onFailure: mode } })),
    toggleAutoClear: () => set((s) => ({ settings: { ...s.settings, autoClearCompleted: !s.settings.autoClearCompleted } })),
    setStatus: (status) => set(() => ({ status })),
  }));

  ```


  FILE 2: src/components/queue/QueueControls.tsx

