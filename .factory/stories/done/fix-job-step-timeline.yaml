  "use client";
  import { useState, useEffect, useRef } from "react";
  import { useJobsStore } from "@/store/jobs";
  import { JobStep } from "@/types/chat";
  import StepItem from "./StepItem";
  import styles from "./StepTimeline.module.css";

  export default function StepTimeline({ jobId }: { jobId: string }) {
    const { getJob } = useJobsStore();
    const job = getJob(jobId);
    const steps = job?.steps || [];
    const scrollRef = useRef<HTMLDivElement>(null);

    useEffect(() => {
      if (scrollRef.current) {
        scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }
    }, [steps.length]);

    return (
      <div className={styles.timelineContainer} ref={scrollRef}>
        <div className={styles.timelineLine}>
          {steps.map((step, i) => (
            <StepItem key={step.id || i} step={step} />
          ))}
        </div>
      </div>
    );
  }

