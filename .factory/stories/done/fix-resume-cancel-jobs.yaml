fix_instructions: |-
  ## FIX TASK: Implement Resume and Cancel for Agentic Jobs

  The CLI has stalled twice by listing files instead of implementing. This fix task requires IMMEDIATE code writing.

  ### Files to CREATE (write these files from scratch):

  **1. `src/components/jobs/CancelJobSheet.tsx`**
  ```tsx
  "use client";
  import { X, AlertTriangle } from "lucide-react";
  import styles from "./CancelJobSheet.module.css";

  interface CancelJobSheetProps {
    isOpen: boolean;
    onClose: () => void;
    onConfirm: () => void;
  }

  export default function CancelJobSheet({ isOpen, onClose, onConfirm }: CancelJobSheetProps) {
    if (!isOpen) return null;
    return (
      <div className={styles.overlay} onClick={onClose}>
        <div className={styles.sheet} onClick={(e) => e.stopPropagation()}>
          <div className={styles.header}>
            <h2>Cancel Job?</h2>
            <button className={styles.closeBtn} onClick={onClose}><X size={20} /></button>
          </div>
          <div className={styles.body}>
            <AlertTriangle size={24} className={styles.icon} />
            <p>This will permanently stop the job. Any progress made will be lost.</p>
          </div>
          <div className={styles.actions}>
            <button className={styles.cancelBtn} onClick={onClose}>Cancel</button>
            <button className={styles.stopBtn} onClick={onConfirm}>Stop Job</button>
          </div>
        </div>
      </div>
    );
  }
  ```

