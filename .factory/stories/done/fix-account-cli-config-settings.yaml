  ### File: `src/components/settings/CliConfigSection.tsx`

  ```tsx

  'use client';

  import { useEffect, useState } from 'react';

  import { Info } from 'lucide-react';

  import styles from './CliConfigSection.module.css';

  import { useCliConfigStore } from '@/store/cli-config';

  import { useToastStore } from '@/store/toast';


  export default function CliConfigSection() {
    const { fields, editedValues, loading, error, hasChanges, fetchConfig, updateField, saveConfig, resetChanges } = useCliConfigStore();
    const addToast = useToastStore(s => s.addToast);
    const [errors, setErrors] = useState<Record<string, string>>({});

    useEffect(() => { fetchConfig(); }, [fetchConfig]);

    const validate = () => {
      const errs: Record<string, string> = {};
      fields.forEach(f => {
        const val = editedValues[f.key] ?? f.value;
        if (f.type === 'number') {
          if (typeof val !== 'number' || isNaN(val)) errs[f.key] = 'Must be a number';
        }
        if (f.type === 'text' && typeof val === 'string' && f.key !== 'api_key' && !val) {
          errs[f.key] = 'This field is required';
        }
      });
      setErrors(errs);
      return Object.keys(errs).length === 0;
    };

    const handleSave = async () => {
      if (!validate()) return;
      const ok = await saveConfig();
      addToast({
        variant: ok ? 'success' : 'error',
        title: ok ? 'Config Saved' : 'Save Failed',
        message: ok ? 'Settings updated successfully' : 'Could not save config',
      });
    };

    const getValue = (f: (typeof fields)[0]) => editedValues[f.key] ?? f.value;

    if (loading) return <div className={styles.section}>Loading...</div>;
    if (error) return <div className={styles.section}>{error}</div>;

    return (
      <div className={styles.section}>
        {fields.map(f => (
          <div key={f.key} className={styles.field}>
            <div className={styles.fieldHeader}>
              <label className={styles.key}>{f.key}</label>
              <span className={styles.tooltip} title={f.description}><Info size={14} /></span>
            </div>
            {f.type === 'toggle' && (
              <label className={styles.toggle}>
                <input
                  type="checkbox"
                  checked={getValue(f) as boolean}
                  onChange={e => updateField(f.key, e.target.checked)}
                />
                <span className={styles.toggleSlider} />
              </label>
            )}
            {f.type === 'number' && (
              <input
                type="number"
                className={`${styles.input} ${errors[f.key] ? styles.error : ''}`}
                value={getValue(f) as number}
                onChange={e => updateField(f.key, Number(e.target.value))}
              />
            )}
            {f.type === 'text' && (
              <input
                type="text"
                className={`${styles.input} ${errors[f.key] ? styles.error : ''}`}
                value={getValue(f) as string}
                onChange={e => updateField(f.key, e.target.value)}
              />
            )}
            {errors[f.key] && <span className={styles.errorText}>{errors[f.key]}</span>}
          </div>
        ))}
        {hasChanges && (
          <div className={styles.footer}>
            <button className={styles.saveBtn} onClick={handleSave}>Save Changes</button>
            <button className={styles.resetBtn} onClick={resetChanges}>Reset</button>
          </div>
        )}
      </div>
    );
  }

  ```


