  ## Step 2: Create Store


  ### File: `src/store/cli-config.ts`

  ```typescript

  import { create } from 'zustand';


  export interface ConfigField {
    key: string;
    value: string | number | boolean;
    type: 'text' | 'number' | 'toggle';
    description: string;
  }


  interface CliConfigState {
    fields: ConfigField[];
    editedValues: Record<string, string | number | boolean>;
    loading: boolean;
    error: string | null;
    hasChanges: boolean;
    fetchConfig: () => Promise<void>;
    updateField: (key: string, value: string | number | boolean) => void;
    saveConfig: () => Promise<boolean>;
    resetChanges: () => void;
  }


  export const useCliConfigStore = create<CliConfigState>((set, get) => ({
    fields: [],
    editedValues: {},
    loading: false,
    error: null,
    hasChanges: false,
    fetchConfig: async () => {
      set({ loading: true, error: null });
      try {
        const res = await fetch('/api/cli-config');
        const data = await res.json();
        set({ fields: data.fields, loading: false });
      } catch (err) {
        set({ error: 'Failed to fetch config', loading: false });
      }
    },
    updateField: (key, value) => {
      const { fields, editedValues } = get();
      const field = fields.find(f => f.key === key);
      const typedValue = field?.type === 'number' ? Number(value) : value;
      set({
        editedValues: { ...editedValues, [key]: typedValue },
        hasChanges: true,
      });
    },
    saveConfig: async () => {
      const { editedValues } = get();
      try {
        const res = await fetch('/api/cli-config', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: editedValues }),
        });
        if (!res.ok) throw new Error('Save failed');
        set({ editedValues: {}, hasChanges: false });
        return true;
      } catch {
        return false;
      }
    },
    resetChanges: () => set({ editedValues: {}, hasChanges: false }),
  }));

  ```


