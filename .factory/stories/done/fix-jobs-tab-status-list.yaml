  "use client";

  import { useState, useCallback } from 'react';

  import styles from './FilterTabs.module.css';


  type Filter = 'all' | 'running' | 'completed' | 'failed';


  interface FilterTabsProps {
    activeFilter: Filter;
    onFilterChange: (filter: Filter) => void;
    counts: { all: number; running: number; completed: number; failed: number };
  }


  export default function FilterTabs({ activeFilter, onFilterChange, counts }: FilterTabsProps) {
    const tabs: { key: Filter; label: string; count: number }[] = [
      { key: 'all', label: 'All', count: counts.all },
      { key: 'running', label: 'Running', count: counts.running },
      { key: 'completed', label: 'Completed', count: counts.completed },
      { key: 'failed', label: 'Failed', count: counts.failed },
    ];

    return (
      <div className={styles.tabs}>
        {tabs.map(tab => (
          <button
            key={tab.key}
            className={`${styles.tab} ${activeFilter === tab.key ? styles.active : ''}`}
            onClick={() => onFilterChange(tab.key)}
          >
            {tab.label}
            {tab.count > 0 && <span className={styles.badge}>{tab.count}</span>}
          </button>
        ))}
      </div>
    );
  }

