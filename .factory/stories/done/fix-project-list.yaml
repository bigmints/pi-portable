  ```


  ### 4. src/store/projects.ts

  ```typescript

  import { create } from 'zustand';

  import { Project } from '@/types/projects';


  interface ProjectStore {
    projects: Project[];
    activeProject: Project | null;
    loading: boolean;
    error: string | null;
    lastFetch: number;
    fetchProjects: () => Promise<void>;
    switchProject: (id: string) => Promise<void>;
    isStale: () => boolean;
  }


  export const useProjectStore = create<ProjectStore>((set, get) => ({
    projects: [],
    activeProject: null,
    loading: false,
    error: null,
    lastFetch: 0,
    fetchProjects: async () => {
      set({ loading: true, error: null });
      try {
        const res = await fetch('/api/projects');
        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();
        const active = data.find((p: Project) => p.isActive) || null;
        set({ projects: data, activeProject: active, loading: false, lastFetch: Date.now() });
      } catch {
        set({ error: 'Failed to load projects', loading: false });
      }
    },
    switchProject: async (id: string) => {
      try {
        await fetch('/api/projects/switch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
        const { projects } = get();
        const updated = projects.map((p: Project) => ({ ...p, isActive: p.id === id }));
        set({ projects: updated, activeProject: updated.find((p: Project) => p.id === id) || null });
      } catch {
        set({ error: 'Failed to switch project' });
      }
    },
    isStale: () => {
      return (Date.now() - get().lastFetch) > 30000;
    },
  }));

  ```


