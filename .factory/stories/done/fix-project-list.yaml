  ### 3. src/app/api/projects/switch/route.ts

  ```typescript

  import { NextResponse } from 'next/server';


  export async function POST(request: Request) {
    try {
      const { id } = await request.json();
      return NextResponse.json({ success: true, activeProjectId: id });
    } catch {
