    { id: '2', name: 'cli-tool', path: '/home/bigmints/Projects/cli-tool', lastActive: new Date(Date.now() - 3600000).toISOString(), isActive: false, status: 'idle' },
    { id: '3', name: 'dashboard', path: '/home/bigmints/Projects/dashboard', lastActive: new Date(Date.now() - 86400000).toISOString(), isActive: false, status: 'idle' },
  ];


  export async function GET() {
