      settings: DEFAULT_SETTINGS,
      toggleSetting: (key) => set((state) => {
        const updated = { ...state.settings, [key]: !state.settings[key] };
        fetch("/api/settings/notifications", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updated) }).catch(() => {});
