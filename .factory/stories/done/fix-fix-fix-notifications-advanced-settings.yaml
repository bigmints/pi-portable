  import { useEffect, useRef, useState, useCallback } from "react";

  import { X } from "lucide-react";

  import styles from "./DebugPanel.module.css";


  interface LogEntry { id: number; timestamp: string; type: string; preview: string; }


  const TYPE_COLORS: Record<string, string> = { message: "#22c55e", token: "#3b82f6", error: "#ef4444", job: "#eab308",
  default: "#6b7280" };


  function getTypeColor(type: string): string {
    const lower = type.toLowerCase();
    for (const [key, color] of Object.entries(TYPE_COLORS)) { if (key !== "default" && lower.includes(key)) return color; }
    return TYPE_COLORS.default;
  }


  export default function DebugPanel() {
    const [log, setLog] = useState<LogEntry[]>([]);
    const [position, setPosition] = useState({ x: window.innerWidth - 340, y: window.innerHeight - 420 });
    const [isDragging, setIsDragging] = useState(false);
    const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
    const panelRef = useRef<HTMLDivElement>(null);
    const idRef = useRef(0);
    useEffect(() => {
      const handler = (event: MessageEvent) => {
        try {
          const data = JSON.parse(event.data);
          const type = data.type || "unknown";
          const preview = JSON.stringify(data).slice(0, 120);
          const now = new Date();
          const ts = `${now.getHours().toString().padStart(2,"0")}:${now.getMinutes().toString().padStart(2,"0")}:${now.getSeconds().toString().padStart(2,"0")}.${now.getMilliseconds().toString().padStart(3,"0")}`;
          setLog((prev) => { const updated = [...prev, { id: idRef.current++, timestamp: ts, type, preview }]; return updated.slice(-200); });
        } catch {}
      };
      const ws = (globalThis as any).__piWs;
      if (ws && ws.addEventListener) { ws.addEventListener("message", handler); return () => ws.removeEventListener("message", handler); }
    }, []);
    const handleMouseDown = useCallback((e: React.MouseEvent) => {
      if ((e.target as HTMLElement).closest("[data-close]")) return;
      setIsDragging(true);
      setDragOffset({ x: e.clientX - position.x, y: e.clientY - position.y });
    }, [position]);
    useEffect(() => {
      const handleMove = (e: MouseEvent) => { if (!isDragging) return; setPosition({ x: e.clientX - dragOffset.x, y: e.clientY - dragOffset.y }); };
      const handleUp = () => setIsDragging(false);
      if (isDragging) { window.addEventListener("mousemove", handleMove); window.addEventListener("mouseup", handleUp); return () => { window.removeEventListener("mousemove", handleMove); window.removeEventListener("mouseup", handleUp); }; }
    }, [isDragging, dragOffset]);
    return (
      <div ref={panelRef} className={styles.panel} style={{ left: position.x, top: position.y }} onMouseDown={handleMouseDown}>
        <div className={styles.header}><span className={styles.dragHandle} /><span className={styles.title}>Debug Log</span><button className={styles.closeBtn} data-close onClick={() => panelRef.current?.remove()}><X size={14} /></button></div>
        <div className={styles.body}>
          {log.length === 0 && <div className={styles.empty}>Waiting for messages...</div>}
          {log.map((entry) => (<div key={entry.id} className={styles.entry}><span className={styles.time}>{entry.timestamp}</span><span className={styles.badge} style={{ background: getTypeColor(entry.type) }}>{entry.type}</span><span className={styles.preview}>{entry.preview}</span></div>))}
        </div>
      </div>
    );
  }

  ''')


