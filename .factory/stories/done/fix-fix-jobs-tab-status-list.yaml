      "src/components/jobs/JobCard.tsx": '''"use client";

  import { useState, useCallback } from 'react';

  import { ChevronDown, ChevronUp, Play, Square } from 'lucide-react';

  import type { AgenticJob, JobStatus } from '@/store/jobs';

  import styles from './JobCard.module.css';


  const STATUS_COLORS: Record<JobStatus, string> = {
    running: '#22c55e',
    completed: '#3b82f6',
    failed: '#ef4444',
    cancelled: '#6b7280',
    paused: '#f59e0b',
  };


  function formatDuration(ms: number): string {
    const totalSeconds = Math.floor(ms / 1000);
    if (totalSeconds < 60) return `${totalSeconds}s`;
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    if (hours > 0) return `${hours}h ${minutes}m`;
    return `${minutes}m ${seconds}s`;
  }


  function formatTokens(count: number): string {
    return new Intl.NumberFormat('en-US').format(count) + ' tokens';
  }


  function getProjectColor(slug: string): string {
    let hash = 0;
    for (let i = 0; i < slug.length; i++) {
      hash = ((hash << 5) - hash) + slug.charCodeAt(i);
      hash |= 0;
    }
    const hue = Math.abs(hash % 360);
    return `hsl(${hue}, 60%, 50%)`;
  }


  interface JobCardProps {
    job: AgenticJob;
    isExpanded: boolean;
    onToggle: () => void;
    onResume?: () => void;
    onCancel?: () => void;
  }


  export default function JobCard({ job, isExpanded, onToggle, onResume, onCancel }: JobCardProps) {
    const [expanded, setExpanded] = useState(isExpanded);
    const statusColor = STATUS_COLORS[job.status] || '#6b7280';
    const projectColor = getProjectColor(job.project || 'default');
    const duration = job.startedAt ? (job.completedAt ? new Date(job.completedAt).getTime() - new Date(job.startedAt).getTime() : Date.now() - new Date(job.startedAt).getTime()) : 0;
    const title = (job.firstMessage || job.id).substring(0, 60) + (job.firstMessage && job.firstMessage.length > 60 ? '...' : '');

    const handleToggle = useCallback(() => {
      if (window.innerWidth < 768) {
        window.location.href = `/jobs/${job.id}`;
      } else {
        setExpanded(prev => !prev);
        onToggle();
      }
    }, [job.id, onToggle]);

    const canResume = job.status === 'paused';
    const canCancel = job.status === 'running' || job.status === 'paused';

    return (
      <div className={`${styles.card} ${expanded ? styles.expanded : ''}`}>
        <div className={styles.header} onClick={handleToggle}>
          <div className={styles.left}>
            <div className={styles.badge} style={{ background: projectColor }}>{job.project || 'default'}</div>
            <span className={styles.title}>{title}</span>
          </div>
          <div className={styles.right}>
            <div className={styles.statusChip} style={{ borderColor: statusColor }}>
              {job.status === 'running' && <div className={styles.progressRing} />}
              <span className={styles.statusText} style={{ color: statusColor }}>{job.status}</span>
            </div>
            <span className={styles.meta}>{formatDuration(duration)}</span>
            <span className={styles.meta}>{formatTokens(job.totalTokens || 0)}</span>
          </div>
          <button className={styles.expandBtn} onClick={(e) => { e.stopPropagation(); handleToggle(); }}>
            {expanded ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
          </button>
        </div>
        {expanded && (
          <div className={styles.detail}>
            <div className={styles.detailGrid}>
              <div className={styles.detailItem}>
                <span className={styles.detailLabel}>Job ID</span>
                <span className={styles.detailValue}>{job.id}</span>
              </div>
              <div className={styles.detailItem}>
                <span className={styles.detailLabel}>Status</span>
                <span className={styles.detailValue}>{job.status}</span>
              </div>
              <div className={styles.detailItem}>
                <span className={styles.detailLabel}>Started</span>
                <span className={styles.detailValue}>{job.startedAt ? new Date(job.startedAt).toLocaleString() : 'N/A'}</span>
              </div>
              <div className={styles.detailItem}>
                <span className={styles.detailLabel}>Tokens</span>
                <span className={styles.detailValue}>{formatTokens(job.totalTokens || 0)}</span>
              </div>
            </div>
            {job.steps && job.steps.length > 0 && (
              <div className={styles.steps}>
                <h4>Steps</h4>
                {job.steps.map((step, i) => (
                  <div key={i} className={styles.step}>
                    <span className={styles.stepStatus}>{step.status}</span>
                    <span>{step.title || `Step ${i + 1}`}</span>
                  </div>
                ))}
              </div>
            )}
            <div className={styles.actions}>
              {canResume && onResume && (
                <button className={styles.actionBtn} onClick={onResume}>
                  <Play size={14} /> Resume
                </button>
              )}
              {canCancel && onCancel && (
                <button className={`${styles.actionBtn} ${styles.cancel}`} onClick={onCancel}>
                  <Square size={14} /> Cancel
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  ''',
