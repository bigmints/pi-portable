      "src/components/jobs/JobsView.tsx": '''"use client";

  import { useState, useMemo, useCallback } from 'react';

  import { useJobsStore, type AgenticJob } from '@/store/jobs';

  import FilterTabs from './FilterTabs';

  import JobCard from './JobCard';

  import EmptyState from './EmptyState';

  import styles from './JobsView.module.css';


  type Filter = 'all' | 'running' | 'completed' | 'failed';


  export default function JobsView() {
    const jobs = useJobsStore(state => state.jobs);
    const [activeFilter, setActiveFilter] = useState<Filter>('all');
    const [expandedId, setExpandedId] = useState<string | null>(null);

    const counts = useMemo(() => ({
      all: jobs.length,
      running: jobs.filter(j => j.status === 'running').length,
      completed: jobs.filter(j => j.status === 'completed').length,
      failed: jobs.filter(j => j.status === 'failed').length,
    }), [jobs]);

    const filteredJobs = useMemo(() => {
      const sorted = [...jobs].sort((a, b) => {
        const aTime = a.startedAt ? new Date(a.startedAt).getTime() : 0;
        const bTime = b.startedAt ? new Date(b.startedAt).getTime() : 0;
        return bTime - aTime;
      });
      switch (activeFilter) {
        case 'running': return sorted.filter(j => j.status === 'running');
        case 'completed': return sorted.filter(j => j.status === 'completed');
        case 'failed': return sorted.filter(j => j.status === 'failed');
        default: return sorted;
      }
    }, [jobs, activeFilter]);

    const handleToggle = useCallback((id: string) => {
      setExpandedId(prev => prev === id ? null : id);
    }, []);

    return (
      <div className={styles.container}>
        <div className={styles.header}>
          <h1>Jobs</h1>
        </div>
        <FilterTabs activeFilter={activeFilter} onFilterChange={setActiveFilter} counts={counts} />
        <div className={styles.list}>
          {filteredJobs.length === 0 ? (
            <EmptyState filter={activeFilter} />
          ) : (
            filteredJobs.map(job => (
              <JobCard
                key={job.id}
                job={job}
                isExpanded={expandedId === job.id}
                onToggle={() => handleToggle(job.id)}
              />
            ))
          )}
        </div>
      </div>
    );
  }

  ''',
