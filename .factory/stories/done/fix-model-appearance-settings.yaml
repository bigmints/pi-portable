  ### STEP 3: Write src/store/appearance.ts

  ```typescript

  import { create } from 'zustand';

  import { persist } from 'zustand/middleware';


  export type ThemeMode = 'dark' | 'light' | 'system';

  export type FontSize = 'small' | 'medium' | 'large';

  export type Density = 'compact' | 'comfortable';

  export type CodeFont = 'jetbrains-mono' | 'fira-code' | 'cascadia-code';


  export interface AppearanceSettings {
    theme: ThemeMode;
    fontSize: FontSize;
    density: Density;
    codeFont: CodeFont;
  }


  interface AppearanceStore {
    settings: AppearanceSettings;
    setTheme: (theme: ThemeMode) => void;
    setFontSize: (fontSize: FontSize) => void;
    setDensity: (density: Density) => void;
    setCodeFont: (codeFont: CodeFont) => void;
    syncToServer: () => Promise<void>;
  }


  const FONT_SIZE_MAP: Record<FontSize, string> = { small: '14px', medium: '16px', large: '18px' };

  const CODE_FONT_MAP: Record<CodeFont, string> = {
    'jetbrains-mono': '"JetBrains Mono", monospace',
    'fira-code': '"Fira Code", monospace',
    'cascadia-code': '"Cascadia Code", monospace',
  };


  function applyToDOM(settings: AppearanceSettings) {
    const root = document.documentElement;
    root.style.setProperty('--font-size-base', FONT_SIZE_MAP[settings.fontSize]);
    root.style.setProperty('--code-font-family', CODE_FONT_MAP[settings.codeFont]);
    root.style.setProperty('--message-density', settings.density);
  }


  export const useAppearanceStore = create<AppearanceStore>()(
    persist(
      (set, get) => ({
        settings: { theme: 'system', fontSize: 'medium', density: 'comfortable', codeFont: 'jetbrains-mono' },
        setTheme: (theme) => {
          set({ settings: { ...get().settings, theme } });
          applyToDOM(get().settings);
        },
        setFontSize: (fontSize) => {
          set({ settings: { ...get().settings, fontSize } });
          applyToDOM(get().settings);
        },
        setDensity: (density) => {
          set({ settings: { ...get().settings, density } });
          applyToDOM(get().settings);
        },
        setCodeFont: (codeFont) => {
          set({ settings: { ...get().settings, codeFont } });
          applyToDOM(get().settings);
        },
        syncToServer: async () => {
          await fetch('/api/cli-config', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ appearance: get().settings }) });
        },
      }),
      { name: 'pi-appearance' }
    )
  );

  ```


  ### STEP 4: Write src/components/settings/ModelSelector.tsx

  ```tsx

  'use client';

  import { useEffect, useState } from 'react';

  import { useToastStore } from '@/store/toast';

  import styles from './ModelSelector.module.css';


  interface Model { id: string; name: string; provider: string; contextWindow: number; }


  export function ModelSelector() {
    const [models, setModels] = useState<Model[]>([]);
    const [selected, setSelected] = useState<string>('');
    const [loading, setLoading] = useState(true);
    const addToast = useToastStore(s => s.addToast);

    useEffect(() => {
      fetch('/api/models').then(r => r.json()).then(d => { setModels(d.models); if (d.models.length) setSelected(d.models[0].id); }).finally(() => setLoading(false));
    }, []);

    const handleChange = async (e: React.ChangeEvent<HTMLSelectElement>) => {
      const modelId = e.target.value;
      setSelected(modelId);
      await fetch('/api/cli-config', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: modelId }) });
      addToast({ type: 'success', message: `Model changed to ${models.find(m => m.id === modelId)?.name}` });
    };

    if (loading) return <div className={styles.loading}>Loading models...</div>;
    return (
      <div className={styles.container}>
        <label className={styles.label}>Default Model</label>
        <select className={styles.select} value={selected} onChange={handleChange}>
          {models.map(m => <option key={m.id} value={m.id}>{m.name} ({m.provider}) — {(m.contextWindow / 1000).toFixed(0)}K context</option>)}
        </select>
      </div>
    );
  }

  ```


