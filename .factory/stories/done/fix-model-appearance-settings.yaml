  ### STEP 6: Write src/components/settings/AppearanceSettings.tsx

  ```tsx

  'use client';

  import { useAppearanceStore } from '@/store/appearance';

  import styles from './AppearanceSettings.module.css';


  export function AppearanceSettings() {
    const { settings, setTheme, setFontSize, setDensity, setCodeFont } = useAppearanceStore();

    return (
      <div className={styles.container}>
        <h3 className={styles.sectionTitle}>Appearance</h3>

        <div className={styles.controlGroup}>
          <label className={styles.label}>Theme</label>
          <div className={styles.segmented}>
            {(['dark', 'light', 'system'] as const).map(t => (
              <button key={t} className={`${styles.segBtn} ${settings.theme === t ? styles.active : ''}`} onClick={() => setTheme(t)}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
            ))}
          </div>
        </div>

        <div className={styles.controlGroup}>
          <label className={styles.label}>Font Size</label>
          <div className={styles.sliderRow}>
            {(['small', 'medium', 'large'] as const).map(s => (
              <button key={s} className={`${styles.sizeBtn} ${settings.fontSize === s ? styles.active : ''}`} onClick={() => setFontSize(s)}>{s.charAt(0).toUpperCase() + s.slice(1)}</button>
            ))}
          </div>
        </div>

        <div className={styles.controlGroup}>
          <label className={styles.label}>Message Density</label>
          <div className={styles.toggleRow}>
            {(['compact', 'comfortable'] as const).map(d => (
              <button key={d} className={`${styles.densityBtn} ${settings.density === d ? styles.active : ''}`} onClick={() => setDensity(d)}>{d.charAt(0).toUpperCase() + d.slice(1)}</button>
            ))}
          </div>
        </div>

        <div className={styles.controlGroup}>
          <label className={styles.label}>Code Font</label>
          <select className={styles.select} value={settings.codeFont} onChange={e => setCodeFont(e.target.value as any)}>
            <option value="jetbrains-mono">JetBrains Mono</option>
            <option value="fira-code">Fira Code</option>
            <option value="cascadia-code">Cascadia Code</option>
          </select>
        </div>
      </div>
    );
  }

  ```


