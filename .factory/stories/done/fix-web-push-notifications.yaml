  5. Create src/app/api/push/subscribe/route.ts — POST handler storing subscription in memory Map.


  6. Create src/app/api/push/trigger/route.ts — POST handler that sends push via web-push package (install it: npm
  install web-push).


  7. Create src/app/api/push/test/route.ts — POST handler for test notification.


  8. Update public/sw.js — Add push event handler (showNotification with title, body, icon, tag, data.url) and
