  9. Update src/components/settings/SettingsView.tsx — Add "Notifications" section with permission status display and
  "Test Notification" button that POSTs to /api/push/test.


  10. Update src/store/jobs.ts — On first job start, check push store hasPrompted, if false show banner.


  11. Run npm install web-push, then npm run build. Fix all errors. Print DELIVERY COMPLETE.
