  3. Create src/lib/push-manager.ts — requestSubscription() using VAPID keys from env vars
  (NEXT_PUBLIC_VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY with defaults), sendSubscription() POST to /api/push/subscribe.


  4. Create src/lib/push-notifier.ts — triggerPushNotification(eventType, payload) that POSTs to /api/push/trigger.
