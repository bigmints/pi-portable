fix_instructions: >-
  ## FIX: Implement Saved and Reusable Queues — DIRECT FILE CREATION


  The previous attempts stalled because the CLI listed files instead of creating them. This time, use explicit shell
  commands to create each file.


  ### Target Directory

  `/home/bigmints/Projects/pi-app/pi-app`


  ### Step 1: Append types to src/types/chat.ts

  Run: `cat >> src/types/chat.ts << 'TYPES_EOF'


  export interface QueueTask {
    id: string;
    prompt: string;
    status: 'pending' | 'running' | 'complete' | 'error' | 'cancelled';
    createdAt: string;
  }


  export interface SavedQueue {
    id: string;
    name: string;
    tasks: QueueTask[];
    createdAt: string;
    updatedAt: string;
  }

  TYPES_EOF`


  ### Step 2: Create src/store/saved-queues.ts

  Run: `cat > src/store/saved-queues.ts << 'EOF'

  'use client';

  import { create } from 'zustand';

  import { SavedQueue, QueueTask } from '@/types/chat';


  const STORAGE_KEY = 'pi-saved-queues';


  interface SavedQueuesState {
    savedQueues: SavedQueue[];
    saveQueue: (name: string, tasks: QueueTask[]) => void;
    loadQueue: (id: string) => QueueTask[] | null;
    deleteQueue: (id: string) => void;
    syncToServer: () => Promise<void>;
    pullFromServer: () => Promise<void>;
    init: () => void;
  }


  export const useSavedQueuesStore = create<SavedQueuesState>((set, get) => ({
    savedQueues: [],
    init: () => {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) set({ savedQueues: JSON.parse(stored) });
      } catch { /* ignore */ }
    },
    saveQueue: (name, tasks) => {
      const { savedQueues } = get();
      const existing = savedQueues.find(q => q.name.toLowerCase() === name.toLowerCase());
      const now = new Date().toISOString();
      let updated: SavedQueue[];
      if (existing) {
        updated = savedQueues.map(q => q.id === existing.id ? { ...q, tasks, updatedAt: now } : q);
      } else {
        updated = [...savedQueues, { id: crypto.randomUUID(), name, tasks, createdAt: now, updatedAt: now }];
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
      set({ savedQueues: updated });
      get().syncToServer();
    },
    loadQueue: (id) => get().savedQueues.find(q => q.id === id)?.tasks ?? null,
    deleteQueue: (id) => {
      const updated = get().savedQueues.filter(q => q.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
      set({ savedQueues: updated });
    },
    syncToServer: async () => {
      try { await fetch('/api/queues', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ queues: get().savedQueues }) }); } catch { /* silent */ }
    },
    pullFromServer: async () => {
      try {
        const res = await fetch('/api/queues');
        if (res.ok) { const data = await res.json(); if (data.queues) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data.queues)); set({ savedQueues: data.queues }); } }
      } catch { /* silent */ }
    },
  }));

  EOF`


  ### Step 3: Create src/app/api/queues/route.ts

  Run: `cat > src/app/api/queues/route.ts << 'EOF'

  import { NextResponse } from 'next/server';


  const queuesStore = new Map<string, any>();


  export async function GET() {
    return NextResponse.json({ queues: Array.from(queuesStore.values()) });
  }


  export async function POST(request: Request) {
    const body = await request.json();
    if (body.queues && Array.isArray(body.queues)) {
      queuesStore.clear();
      for (const q of body.queues) queuesStore.set(q.id, q);
    }
    return NextResponse.json({ ok: true });
  }

  EOF`


