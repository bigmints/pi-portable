  ## Step 1: Create `src/lib/relative-time.ts`

  Write this exact file:

  ```ts

  export function formatRelativeTime(timestamp: number): string {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    return new Date(timestamp).toLocaleDateString();
  }

  ```


  ## Step 2: Create `src/store/notifications.ts`

  Write a Zustand store with persist middleware. Interface:

  ```ts

  export interface Notification {
    id: string;
    type: 'job_complete' | 'job_error' | 'task_complete' | 'task_failed' | 'queue_complete' | 'system' | 'message';
    title: string;
    body: string;
    timestamp: number;
    read: boolean;
    link?: string;
    linkLabel?: string;
  }

  ```

  Store: `notifications: Notification[]`, `addNotification`, `markAsRead`, `markAllAsRead`, `clearAll`,
  `removeNotification`, `unreadCount` (computed). Persist to `"pi-notifications"`.


