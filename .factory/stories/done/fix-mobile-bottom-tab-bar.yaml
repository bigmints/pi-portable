  ### FILE 1: `src/components/layout/BottomTabBar.tsx`

  Write this exact content:


  ```tsx

  'use client';


  import { useRouter } from 'next/navigation';

  import { MessageSquare, ListTodo, Wrench, Clock, Settings } from 'lucide-react';

  import { useJobsStore } from '@/store/jobs';

  import styles from './BottomTabBar.module.css';


  interface Tab {
    id: string;
    label: string;
    icon: React.ComponentType<{ className?: string }>;
    route: string;
  }


  const tabs: Tab[] = [
    { id: 'chat', label: 'Chat', icon: MessageSquare, route: '/chat' },
    { id: 'queue', label: 'Queue', icon: ListTodo, route: '/queue' },
    { id: 'jobs', label: 'Jobs', icon: Wrench, route: '/jobs' },
    { id: 'history', label: 'History', icon: Clock, route: '/history' },
    { id: 'settings', label: 'Settings', icon: Settings, route: '/settings' },
  ];


  export default function BottomTabBar() {
    const router = useRouter();
    const pathname = router.pathname;
    const jobs = useJobsStore((state) => state.jobs);
    const runningCount = jobs.filter((j) => j.status === 'running').length;

    const handleTabPress = (route: string) => {
      if (navigator.vibrate) {
        navigator.vibrate(10);
      }
      router.push(route);
    };

    return (
      <nav className={styles.bottomTabBar}>
        {tabs.map((tab) => {
          const Icon = tab.icon;
          const isActive = pathname === tab.route || (tab.route !== '/' && pathname.startsWith(tab.route));
          return (
            <button
              key={tab.id}
              className={`${styles.tab} ${isActive ? styles.active : ''}`}
              onClick={() => handleTabPress(tab.route)}
              aria-label={tab.label}
            >
              <Icon className={styles.tabIcon} />
              <span className={styles.tabLabel}>{tab.label}</span>
              {tab.id === 'jobs' && runningCount > 0 && (
                <span className={styles.badge}>{runningCount}</span>
              )}
            </button>
          );
        })}
      </nav>
    );
  }

  ```


