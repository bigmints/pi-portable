  ### Step 2: Create/complete ALL missing files


  **A. `src/lib/highlight-text.ts`**

  ```typescript

  export function highlightText(text: string, terms: string[]): React.ReactNode[] {
    if (!terms.length || !text) return [text];
    const regex = new RegExp(`(${terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
    const parts = text.split(regex);
    return parts.map((part, i) =>
      regex.test(part) ? <mark key={i} style={{ background: 'var(--color-highlight, #fef08a)', borderRadius: '2px', padding: '0 2px' }}>{part}</mark> : part
    );
  }

  ```


  **B. `src/store/search.ts`** — Zustand store with query, filters (projects[], models[], dateFrom, dateTo), results,
  loading, activeFilterCount. Debounced search (300ms). Actions: setSearchQuery, setFilters, clearFilters, search,
