  ### 7. Write `src/components/common/Lightbox.tsx`

  ```tsx

  'use client';


  import { useEffect } from 'react';

  import { X } from 'lucide-react';

  import styles from './Lightbox.module.css';


  interface LightboxProps {
    imageSrc: string;
    filename: string;
    onClose: () => void;
  }


  export function Lightbox({ imageSrc, filename, onClose }: LightboxProps) {
    useEffect(() => {
      const handleKeyDown = (e: KeyboardEvent) => {
        if (e.key === 'Escape') {
          onClose();
        }
      };
      document.addEventListener('keydown', handleKeyDown);
      return () => document.removeEventListener('keydown', handleKeyDown);
    }, [onClose]);

    return (
      <div className={styles['lightbox-overlay']} onClick={onClose}>
        <div className={styles['lightbox-content']} onClick={(e) => e.stopPropagation()}>
          <button className={styles['lightbox-close']} onClick={onClose}>
            <X size={20} />
          </button>
          <img src={imageSrc} alt={filename} className={styles['lightbox-image']} />
          <div className={styles['lightbox-caption']}>{filename}</div>
        </div>
      </div>
    );
  }

  ```


