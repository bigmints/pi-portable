  ### 5. Write `src/components/chat/ArtifactCard.tsx`

  ```tsx

  'use client';


  import { useState } from 'react';

  import { Copy, Expand, Check, X } from 'lucide-react';

  import { SyntaxHighlighter } from 'react-syntax-highlighter';

  import { oneDark } from 'react-syntax-highlighter/dist/esm/styles/prism';

  import { detectLanguage, isImageFile } from '@/lib/detect-language';

  import { getFileIcon } from '@/lib/file-icons';

  import type { ArtifactFile } from '@/types/chat';

  import styles from './ArtifactCard.module.css';


  interface ArtifactCardProps {
    artifact: ArtifactFile;
    onExpand?: () => void;
    onImageClick?: () => void;
  }


  export function ArtifactCard({ artifact, onExpand, onImageClick }: ArtifactCardProps) {
    const [copied, setCopied] = useState(false);
    const [showDiff, setShowDiff] = useState(true);

    const language = detectLanguage(artifact.filename);
    const isImage = artifact.isImage || isImageFile(artifact.filename);

    const handleCopy = async () => {
      try {
        await navigator.clipboard.writeText(artifact.content);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      } catch {
        // clipboard API not available
      }
    };

    const handleExpand = () => {
      onExpand?.();
    };

    // Image preview
    if (isImage && artifact.imageUrl) {
      return (
        <div className={styles['artifact-card']}>
          <div className={styles['artifact-header']}>
            <span className={styles['artifact-icon']}>{getFileIcon(artifact.filename)}</span>
            <span className={styles['artifact-filename']}>{artifact.filename}</span>
            <div className={styles['artifact-badges']}>
              <span className={styles.badge}>{artifact.language}</span>
            </div>
            <div className={styles['artifact-actions']}>
              <button
                className={styles['action-btn']}
                onClick={handleCopy}
                title="Copy"
              >
                {copied ? <Check size={14} /> : <Copy size={14} />}
              </button>
              <button
                className={styles['action-btn']}
                onClick={handleExpand}
                title="Expand"
              >
                <Expand size={14} />
              </button>
            </div>
          </div>
          <img
            src={artifact.imageUrl}
            alt={artifact.filename}
            className={styles['artifact-image']}
            onClick={onImageClick}
          />
        </div>
      );
    }

    // Diff view for modified files
    if (artifact.isModified && artifact.diffContent && showDiff) {
      const lines = artifact.diffContent.split('\n');
      const displayLines = lines.slice(0, 20);

      return (
        <div className={styles['artifact-card']}>
          <div className={styles['artifact-header']}>
            <span className={styles['artifact-icon']}>{getFileIcon(artifact.filename)}</span>
            <span className={styles['artifact-filename']}>{artifact.filename}</span>
            <div className={styles['artifact-badges']}>
              <span className={styles.badge}>{artifact.language}</span>
              <span className={`${styles.badge} ${styles['badge-diff']}`}>
                +{artifact.diffAdded} -{artifact.diffRemoved}
              </span>
              <span className={`${styles.badge} ${styles['badge-lines']}`}>
                {artifact.lineCount} lines
              </span>
            </div>
            <div className={styles['artifact-actions']}>
              <button
                className={styles['action-btn']}
                onClick={handleCopy}
                title="Copy"
              >
                {copied ? <Check size={14} /> : <Copy size={14} />}
              </button>
              <button
                className={styles['action-btn']}
                onClick={handleExpand}
                title="Expand"
              >
                <Expand size={14} />
              </button>
            </div>
          </div>
          <div className={styles['artifact-body']}>
            <div className={styles['diff-view']}>
              {displayLines.map((line, i) => {
                const isAdded = line.startsWith('+');
                const isRemoved = line.startsWith('-');
                const lineNum = i + 1;
                return (
                  <div
                    key={i}
                    className={`${styles['diff-line']} ${isAdded ? styles.added : isRemoved ? styles.removed : ''}`}
                  >
                    <span className={styles['diff-line-num']}>{lineNum}</span>
                    <span className={styles['diff-line-content']}>{line}</span>
                  </div>
                );
              })}
              {lines.length > 20 && (
                <div style={{ padding: '8px 12px', color: 'var(--color-text-secondary)', fontSize: 11 }}>
                  ... and {lines.length - 20} more lines
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Default: syntax highlighted code
    const contentLines = artifact.content.split('\n').slice(0, 20).join('\n');

    return (
      <div className={styles['artifact-card']}>
        <div className={styles['artifact-header']}>
          <span className={styles['artifact-icon']}>{getFileIcon(artifact.filename)}</span>
          <span className={styles['artifact-filename']}>{artifact.filename}</span>
          <div className={styles['artifact-badges']}>
            <span className={styles.badge}>{artifact.language}</span>
            <span className={`${styles.badge} ${styles['badge-lines']}`}>
              {artifact.lineCount} lines
            </span>
          </div>
          <div className={styles['artifact-actions']}>
            <button
              className={styles['action-btn']}
              onClick={handleCopy}
              title="Copy"
            >
              {copied ? <Check size={14} /> : <Copy size={14} />}
            </button>
            <button
              className={styles['action-btn']}
              onClick={handleExpand}
              title="Expand"
            >
              <Expand size={14} />
            </button>
          </div>
        </div>
        <div className={styles['artifact-body']}>
          <SyntaxHighlighter
            language={language === 'plaintext' ? 'text' : language}
            style={oneDark}
            customStyle={{
              background: 'transparent',
              margin: 0,
              borderRadius: 0,
              fontSize: '12px',
            }}
            showLineNumbers
            lineNumberStyle={{
              minWidth: '24px',
              paddingRight: '8px',
              color: '#64748b',
            }}
          >
            {contentLines}
          </SyntaxHighlighter>
        </div>
      </div>
    );
  }

  ```


