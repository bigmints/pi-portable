  ## Step 7: Edit `src/app/jobs/[id]/page.tsx`

  Import ArtifactList and render it after the step timeline. Add:

  ```tsx

  import ArtifactList from '@/components/jobs/ArtifactList';

  // ... inside the page component, after StepTimeline:

  {job?.artifacts && <ArtifactList artifacts={job.artifacts} />}

  ```


  ## Step 8: Edit `src/lib/ws-client.ts`

  In the existing WebSocket message handler, add handling for artifact events. Find where `job_event` frames are
  processed and add:

  ```typescript

  if (frame.type === 'job_event' && frame.artifact) {
    useJobsStore.getState().addArtifact(frame.job_id, frame.artifact);
  }

  ```


