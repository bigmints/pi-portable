  ## Step 5: Create `src/components/jobs/ArtifactList.tsx`

  ```tsx

  'use client';

  import { Artifact } from '@/types/chat';

  import ArtifactRow from './ArtifactRow';

  import styles from './ArtifactList.module.css';


  const PRIORITY: Record<string, number> = { created: 0, modified: 1, read: 2, deleted: 3 };


  export default function ArtifactList({ artifacts }: { artifacts: Artifact[] }) {
    if (!artifacts || artifacts.length === 0) return null;
    const sorted = [...artifacts].sort((a, b) => {
      const pa = PRIORITY[a.action] ?? 99;
      const pb = PRIORITY[b.action] ?? 99;
      if (pa !== pb) return pa - pb;
      return (b.timestamp ?? 0) - (a.timestamp ?? 0);
    });
    return (
      <section className={styles.section}>
        <h3 className={styles.header}>Files ({artifacts.length})</h3>
        <div className={styles.list}>
          {sorted.map((a, i) => <ArtifactRow key={a.path + i} artifact={a} />)}
        </div>
      </section>
    );
  }

  ```


