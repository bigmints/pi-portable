fix_instructions: >-
  # FIX: Build Artifact Links Within Job Detail


  ## IMMEDIATE ACTION REQUIRED — Do NOT list files or plan. Start coding now.


  ## Target: `/home/bigmints/Projects/pi-app/pi-app`


  ## Step 1: Edit `src/types/chat.ts`

  Find the `AgenticJob` interface and add `artifacts?: Artifact[]` to it.

  Add these new interfaces before the exports:

  ```typescript

  export type ArtifactAction = 'created' | 'modified' | 'read' | 'deleted';

  export interface Artifact {
    path: string;
    action: ArtifactAction;
    size?: number;
    timestamp?: number;
  }

  ```


  ## Step 2: Edit `src/store/jobs.ts`

  Add to the Zustand store state and actions:

  ```typescript

  // In state:

  // (artifacts are stored per-job in the AgenticJob interface, no separate state needed)


  // In actions:

  addArtifact: (jobId: string, artifact: Artifact) => {
    const existing = jobs.find(j => j.id === jobId);
    if (!existing) return;
    const artifacts = existing.artifacts || [];
    const idx = artifacts.findIndex(a => a.path === artifact.path);
    const updated = idx >= 0 ? [...artifacts.slice(0, idx), artifact, ...artifacts.slice(idx + 1)] : [...artifacts, artifact];
    set(state => ({
      jobs: state.jobs.map(j => j.id === jobId ? { ...j, artifacts: updated } : j)
    }));
  }

  ```


  ## Step 3: Create `src/components/jobs/ArtifactRow.tsx`

  ```tsx

  'use client';

  import { FileText, ExternalLink } from 'lucide-react';

  import { Artifact } from '@/types/chat';

  import styles from './ArtifactRow.module.css';


  const ACTION_COLORS: Record<string, string> = {
    created: 'var(--color-success)',
    modified: 'var(--color-warning)',
    read: 'var(--color-info)',
    deleted: 'var(--color-danger)',
  };


  function formatSize(bytes?: number): string {
    if (!bytes) return '';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / 1048576).toFixed(1)} MB`;
  }


  export default function ArtifactRow({ artifact }: { artifact: Artifact }) {
    const encoded = encodeURIComponent(artifact.path);
    return (
      <div className={styles.row}>
        <FileText size={16} className={styles.icon} />
        <span className={styles.path} title={artifact.path}>{artifact.path}</span>
        <span className={styles.badge} style={{ backgroundColor: ACTION_COLORS[artifact.action] }}>{artifact.action}</span>
        <span className={styles.size}>{formatSize(artifact.size)}</span>
        <a href={`/files/${encoded}`} className={styles.linkBtn}>
          <ExternalLink size={14} />
        </a>
      </div>
    );
  }

  ```


