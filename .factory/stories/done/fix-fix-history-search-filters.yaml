  'use client';

  import { useState, useRef } from 'react';

  import { Search, X } from 'lucide-react';

  import { useSearchStore } from '@/store/search';

  import styles from './SearchBar.module.css';

  export default function SearchBar() {
    const { query, setSearchQuery, loading, clearSearch } = useSearchStore();
    const [local, setLocal] = useState(query);
    const timer = useRef<ReturnType<typeof setTimeout>>();
    const handleChange = (e: React.ChangeEvent<HTMLInputElement>) => { const v = e.target.value; setLocal(v); if (timer.current) clearTimeout(timer.current); timer.current = setTimeout(() => setSearchQuery(v), 300); };
    return (
      <div className={styles.container}>
        <Search className={styles.icon} size={18} />
        {loading ? <div className={styles.spinner} /> : <input className={styles.input} type="text" placeholder="Search conversations..." value={local} onChange={handleChange} />}
        {local && <button className={styles.clearBtn} onClick={() => { setLocal(''); clearSearch(); }} aria-label="Clear"><X size={16} /></button>}
      </div>
    );
  }

  ```


