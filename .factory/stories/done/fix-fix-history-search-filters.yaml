  interface SearchState { query: string; filters: { projects: string[]; models: string[]; dateFrom: string; dateTo:
  string; }; results: SearchResult[]; loading: boolean; activeFilterCount: number; setSearchQuery: (q: string) => void;
  setFilters: (f: Partial<SearchState['filters']>) => void; clearFilters: () => void; search: () => Promise<void>;
  clearSearch: () => void; }

