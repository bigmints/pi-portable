  ### File 6: src/components/history/FilterPanel.tsx

  ```tsx

  'use client';

  import { X } from 'lucide-react';

  import { useSearchStore } from '@/store/search';

  import styles from './FilterPanel.module.css';

  const PROJECTS = ['pi-app', 'docs', 'scripts'];

  const MODELS = ['gpt-4', 'claude-3', 'gemini-pro'];

  interface Props { open: boolean; onClose: () => void; }

  export default function FilterPanel({ open, onClose }: Props) {
    const { filters, setFilters, clearFilters, activeFilterCount } = useSearchStore();
    const toggleProject = (p: string) => setFilters({ projects: filters.projects.includes(p) ? filters.projects.filter(x => x !== p) : [...filters.projects, p] });
    const toggleModel = (m: string) => setFilters({ models: filters.models.includes(m) ? filters.models.filter(x => x !== m) : [...filters.models, m] });
    if (!open) return null;
    return (
      <div className={styles.overlay} onClick={onClose}>
        <div className={styles.panel} onClick={e => e.stopPropagation()}>
          <div className={styles.header}><h3>Filters</h3><button onClick={onClose} aria-label="Close"><X size={18} /></button></div>
          <div className={styles.section}><h4>Projects</h4>{PROJECTS.map(p => <label key={p} className={styles.checkbox}><input type="checkbox" checked={filters.projects.includes(p)} onChange={() => toggleProject(p)} /><span>{p}</span></label>)}</div>
          <div className={styles.section}><h4>Models</h4>{MODELS.map(m => <label key={m} className={styles.checkbox}><input type="checkbox" checked={filters.models.includes(m)} onChange={() => toggleModel(m)} /><span>{m}</span></label>)}</div>
          <div className={styles.section}><h4>Date Range</h4><div className={styles.dateRow}><input type="date" value={filters.dateFrom} onChange={e => setFilters({ dateFrom: e.target.value })} /><input type="date" value={filters.dateTo} onChange={e => setFilters({ dateTo: e.target.value })} /></div></div>
          <div className={styles.actions}><button className={styles.resetBtn} onClick={() => { clearFilters(); onClose(); }}>Reset</button><button className={styles.applyBtn} onClick={onClose}>Apply ({activeFilterCount})</button></div>
        </div>
      </div>
    );
  }

  ```


