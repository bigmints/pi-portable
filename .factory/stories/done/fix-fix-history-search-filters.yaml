    let results = [...MOCK];
    if (q) { const l = q.toLowerCase(); results = results.filter(r => r.title.toLowerCase().includes(l) || r.preview.toLowerCase().includes(l)); }
    if (projects.length) results = results.filter(r => projects.includes(r.project));
    if (models.length) results = results.filter(r => models.includes(r.model));
    if (dateFrom) results = results.filter(r => r.date >= dateFrom);
    if (dateTo) results = results.filter(r => r.date <= dateTo);
    return NextResponse.json({ results, total: results.length });
