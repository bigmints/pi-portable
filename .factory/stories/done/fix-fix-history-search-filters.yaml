    setSearchQuery: (q) => { set({ query: q }); setTimeout(() => get().search(), 300); },
    setFilters: (f) => { const cur = get().filters; const upd = { ...cur, ...f }; const c = upd.projects.length + upd.models.length + (upd.dateFrom ? 1 : 0) + (upd.dateTo ? 1 : 0); set({ filters: upd, activeFilterCount: c }); },
    clearFilters: () => set({ filters: { projects: [], models: [], dateFrom: '', dateTo: '' }, activeFilterCount: 0 }),
    search: async () => { const { query, filters } = get(); set({ loading: true }); try { const p = new URLSearchParams(); if (query) p.set('q', query); if (filters.projects.length) p.set('projects', filters.projects.join(',')); if (filters.models.length) p.set('models', filters.models.join(',')); if (filters.dateFrom) p.set('dateFrom', filters.dateFrom); if (filters.dateTo) p.set('dateTo', filters.dateTo); const r = await fetch(`/api/conversations/search?${p}`); const d = await r.json(); set({ results: d.results || [], loading: false }); } catch { set({ loading: false }); } },
    clearSearch: () => set({ query: '', results: [], filters: { projects: [], models: [], dateFrom: '', dateTo: '' }, activeFilterCount: 0 }),
