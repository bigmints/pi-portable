  'use client';

  import { useState } from 'react';

  import { useSearchStore } from '@/store/search';

  import SearchBar from './SearchBar';

  import FilterButton from './FilterButton';

  import FilterPanel from './FilterPanel';

  import SearchResultItem from './SearchResultItem';

  import SearchEmptyState from './SearchEmptyState';

  import styles from './SearchResultsView.module.css';

  export default function SearchResultsView() {
    const { query, results, loading } = useSearchStore();
    const [filterOpen, setFilterOpen] = useState(false);
    const terms = query.split(/\s+/).filter(Boolean);
    return (
      <div className={styles.container}>
        <div className={styles.toolbar}><SearchBar /><FilterButton onClick={() => setFilterOpen(true)} /></div>
        <FilterPanel open={filterOpen} onClose={() => setFilterOpen(false)} />
        <div className={styles.results}>
          {loading && <div className={styles.loading}>Searching...</div>}
          {!loading && query && results.length === 0 && <SearchEmptyState query={query} />}
          {!loading && results.map(r => <SearchResultItem key={r.id} result={r} terms={terms} />)}
        </div>
      </div>
    );
  }

