  ### 2. CREATE `src/components/chat/Composer.tsx`

  Write this exact component:

  ```tsx

  'use client';


  import { useState, useEffect, useRef, useCallback } from 'react';

  import { Send } from 'lucide-react';

  import styles from './Composer.module.css';


  interface ComposerProps {
    conversationId?: string;
    isStreaming?: boolean;
    onSubmit: (text: string) => void;
    placeholder?: string;
    autoFocus?: boolean;
  }


  export default function Composer({
    conversationId,
    isStreaming = false,
    onSubmit,
    placeholder = 'Type a message...',
    autoFocus = true,
  }: ComposerProps) {
    const [text, setText] = useState('');
    const textareaRef = useRef<HTMLTextAreaElement>(null);
    const saveTimeoutRef = useRef<ReturnType<typeof setTimeout>>();

    useEffect(() => {
      if (conversationId) {
        const draft = localStorage.getItem(`pi-draft-${conversationId}`);
        if (draft) {
          setText(draft);
        }
      }
      if (autoFocus && textareaRef.current) {
        textareaRef.current.focus();
      }
    }, [conversationId, autoFocus]);

    useEffect(() => {
      const el = textareaRef.current;
      if (!el) return;
      const adjust = () => {
        el.style.height = 'auto';
        el.style.height = `${Math.min(el.scrollHeight, 240)}px`;
      };
      adjust();
      window.addEventListener('resize', adjust);
      return () => window.removeEventListener('resize', adjust);
    }, [text]);

    const saveDraft = useCallback((value: string) => {
      if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
      saveTimeoutRef.current = setTimeout(() => {
        if (conversationId && value.trim()) {
          localStorage.setItem(`pi-draft-${conversationId}`, value);
        }
      }, 300);
    }, [conversationId]);

    const handleChange = (e: React.ChangeEvent<HTMLTextAreaElement>) => {
      if (isStreaming) return;
      const value = e.target.value;
      setText(value);
      saveDraft(value);
    };

    const handleKeyDown = (e: React.KeyboardEvent<HTMLTextAreaElement>) => {
      if (isStreaming) return;
      if (e.key === 'Enter' && !e.shiftKey && !e.metaKey) {
        e.preventDefault();
        if (text.trim()) {
          handleSubmit();
        }
      }
    };

    const handleSubmit = () => {
      if (!text.trim() || isStreaming) return;
      onSubmit(text);
      setText('');
      if (conversationId) {
        localStorage.removeItem(`pi-draft-${conversationId}`);
      }
    };

    const charCount = text.length;
    const showBadge = charCount > 500;
    const estimatedTokens = Math.ceil(charCount / 4);

    return (
      <div className={styles.composer}>
        <textarea
          ref={textareaRef}
          className={styles.textarea}
          value={text}
          onChange={handleChange}
          onKeyDown={handleKeyDown}
          disabled={isStreaming}
          placeholder={isStreaming ? 'Generating…' : placeholder}
          rows={1}
        />
        {showBadge && (
          <div className={styles.badge}>
            {charCount} chars · ~{estimatedTokens} tokens
          </div>
        )}
        <button
          className={styles.sendButton}
          disabled={isStreaming || !text.trim()}
          onClick={handleSubmit}
          aria-label="Send message"
        >
          <Send size={16} />
        </button>
      </div>
    );
  }

  ```


