        status: ready
        progressPercent: 0
      - name: "UI Overhaul: Message Bubbles & Code Blocks"
        file: .factory/stories/features/ui-overhaul/004-message-bubbles.yaml
        status: ready
        progressPercent: 0
      - name: "UI Overhaul: Sheets, Dialogs & Modals"
        file: .factory/stories/features/ui-overhaul/005-interactive-sheets.yaml
        status: ready
        progressPercent: 0
      - name: "UI Overhaul: Queue & Jobs Dashboard"
        file: .factory/stories/features/ui-overhaul/006-dashboards.yaml
        status: ready
