            status: complete
        progressPercent: 0
    progressPercent: 0
  - name: 🎨 UI Overhaul (Shadcn + Tailwind)
    description: Overhaul the Entire pi-app UI to standard Shadcn/UI and pure Tailwind CSS, removing all custom CSS modules
      and overrides.
    status: in-progress
