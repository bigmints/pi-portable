name: pi-app
description: >
  Mobile-first PWA web client for the pi CLI. Provides real-time streaming chat, agentic job monitoring, project
  management, and full CLI feature parity. Built with Next.js 14 App Router, TypeScript strict mode, and Vanilla CSS
  custom properties — no Tailwind. Designed as a progressive web app with offline shell support and mobile-first
  responsive layout.
brd: >-
  # pi-app (BRD)


  Mobile-first PWA web client for the pi CLI. Provides real-time streaming chat, agentic job monitoring, project
  management, and full CLI feature parity. Built with Next.js 14 App Router, TypeScript strict mode, and Vanilla CSS
  custom properties — no Tailwind. Designed as a progressive web app with offline shell support and mobile-first
  responsive layout.



  ## Architecture & Requirements

  - **Framework**: next.js

  - **Language**: typescript
version: 1.0.0
stack:
  framework: next.js
  language: typescript
  packageManager: npm
  linter: eslint
status: in-progress
