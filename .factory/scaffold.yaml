name: pi-app
description: >
  A mobile-first progressive web app that exposes the full capability of the pi CLI through a real-time chat-style
  interface. Users get complete feature parity with the terminal — live streaming conversations, agentic job monitoring,
  autonomous task queuing, conversation controls (interrupt, retry, fork), project management, file and artifact
  viewing, push notifications for job completion and failures, and full settings control — all from any device with no
  install required.
version: 1.0.0
status: in-progress
progressPercent: 92
stack:
  framework: next.js
  language: typescript
  packageManager: npm
  styling: vanilla-css
  database: none
  cloud: vercel
