<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — pi-app</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, -sf-ui-text, -apple-system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f1a;
      color: #e2e8f0;
      text-align: center;
      padding: 2rem;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      padding-left: env(safe-area-inset-left, 0);
      padding-right: env(safe-area-inset-right, 0);
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .status {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: #252540;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: #f59e0b;
      margin-bottom: 2rem;
    }

    .status.reconnecting {
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
    }

    .status.offline {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .actions a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: #252540;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s ease;
    }

    .actions a:hover {
      background: #3d3d5c;
    }

    .actions a.primary {
      background: #6366f1;
    }

    .actions a.primary:hover {
      background: #4f46e5;
    }

    .tips {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 0.75rem;
      padding: 1.25rem;
      text-align: left;
    }

    .tips h3 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #e2e8f0;
    }

    .tips ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tips li {
      font-size: 0.8125rem;
      color: #94a3b8;
      padding-left: 1.25rem;
      position: relative;
    }

    .tips li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #22c55e;
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .icon {
        font-size: 3rem;
      }

      h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>pi-app is currently unavailable. Please check your internet connection and try again.</p>
    <div id="status" class="status">
      <span id="statusText">Checking connection...</span>
    </div>

    <div class="actions">
      <a href="/" class="primary">→ Go Home</a>
      <a href="#" onclick="location.reload(); return false;">↻ Retry</a>
    </div>

    <div class="tips">
      <h3>While you're offline</h3>
      <ul>
        <li>Your conversations are saved locally</li>
        <li>Messages will sync when reconnected</li>
        <li>Check your network settings</li>
      </ul>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');

    // Auto-refresh when connection is restored
    window.addEventListener('online', () => {
      statusEl.className = 'status reconnecting';
      statusText.textContent = 'Reconnecting...';
      setTimeout(() => location.reload(), 1000);
    });

    // Update status after 5 seconds
    setTimeout(() => {
      if (navigator.onLine) {
        statusEl.className = 'status reconnecting';
        statusText.textContent = 'Reconnecting...';
        setTimeout(() => location.reload(), 1000);
      } else {
        statusEl.className = 'status offline';
        statusText.textContent = 'Still offline';
      }
    }, 5000);

    // Check every 10 seconds
    setInterval(() => {
      if (navigator.onLine) {
        statusEl.className = 'status reconnecting';
        statusText.textContent = 'Reconnecting...';
        setTimeout(() => location.reload(), 1000);
      }
    }, 10000);
  </script>
</body>
</html>
